<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>西浦学生升学之路 · 暗夜古堡试炼</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    :root {
      --gold1: #f1e1b0;
      --gold2: #c7a25d;
      --gold3: #7d6130;

      --stone1: #b8bec9;
      --stone2: #7d8695;
      --stone3: #4d5562;
      --stone4: #252b35;

      --night1: #050814;
      --night2: #0b1224;
      --night3: #101a31;
      --night4: #1a2742;

      --moon: #dfe8ff;
      --panel: rgba(255,255,255,0.08);
      --mist: rgba(220,228,255,0.08);
      --fire1: #fff0bf;
      --fire2: #efc268;
      --fire3: #d88435;
    }

    body {
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      overflow: hidden;
      color: #fff;
      height: 100vh;
      background:
        radial-gradient(circle at 78% 15%, rgba(220,230,255,.12), transparent 18%),
        radial-gradient(circle at 16% 18%, rgba(255,255,255,.04), transparent 12%),
        linear-gradient(to bottom, #03050b 0%, #07101d 26%, #0c1730 58%, #132443 100%);
    }

    .sky, .dusts {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .star {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 10px rgba(255,255,255,.65);
      animation: twinkle 3.2s infinite ease-in-out;
    }

    .dust {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,.8), rgba(180,195,255,.35), transparent 75%);
      animation: drift 12s linear infinite;
      opacity: .55;
    }

    @keyframes twinkle {
      0%,100% { opacity: .22; transform: scale(1); }
      50% { opacity: .9; transform: scale(1.5); }
    }

    @keyframes drift {
      0% { transform: translate(0,0) scale(.8); opacity: 0; }
      15% { opacity: .55; }
      100% { transform: translate(70px,-180px) scale(1.25); opacity: 0; }
    }

    .moon {
      position: fixed;
      right: 7%;
      top: 6%;
      width: 175px;
      height: 175px;
      border-radius: 50%;
      z-index: 2;
      background: radial-gradient(circle, #f8fbff 0%, #dfe8ff 55%, #c6d0e8 82%, rgba(255,255,255,.04) 100%);
      box-shadow: 0 0 36px rgba(218,228,255,.55), 0 0 120px rgba(170,190,240,.24);
    }

    .moon::after {
      content: "";
      position: absolute;
      right: 18px;
      top: 20px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(180,192,220,.14);
    }

    .topbar {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: min(1280px, 95vw);
      display: flex;
      gap: 14px;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      z-index: 40;
    }

    .panel {
      backdrop-filter: blur(14px);
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.04));
      border: 1px solid rgba(255,255,255,.13);
      border-radius: 20px;
      box-shadow: 0 0 24px rgba(0,0,0,.25), inset 0 0 18px rgba(255,255,255,.02);
      padding: 16px 22px;
    }

    .title-box {
      min-width: 520px;
    }

    .title {
      font-size: 30px;
      font-weight: 900;
      background: linear-gradient(90deg, #fff, #f0deb0, #dfe8ff, #fff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 1px;
    }

    .subtitle {
      margin-top: 8px;
      color: #e8edff;
      line-height: 1.65;
      font-size: 14px;
      opacity: .96;
    }

    .status {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .stat {
      min-width: 118px;
      text-align: center;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.10);
    }

    .stat-label {
      font-size: 12px;
      color: #dbe5ff;
    }

    .stat-value {
      margin-top: 6px;
      font-size: 22px;
      font-weight: 900;
      color: #ecd9a7;
    }

    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .ground {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 19vh;
      background: linear-gradient(to top, #0f1a12, #17251b 40%, transparent);
      z-index: 3;
    }

    .mist {
      position: absolute;
      left: 0;
      bottom: 8vh;
      width: 100%;
      height: 12vh;
      background: linear-gradient(to right, rgba(255,255,255,.03), rgba(220,228,255,.11), rgba(255,255,255,.03));
      filter: blur(18px);
      z-index: 4;
    }

    .road {
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 30vw;
      min-width: 320px;
      height: 18vh;
      background: linear-gradient(to top, rgba(122,129,141,.46), rgba(255,255,255,.10), transparent);
      clip-path: polygon(40% 100%, 60% 100%, 74% 0, 26% 0);
      z-index: 4;
    }

    .castle-wrap {
      position: absolute;
      left: 50%;
      bottom: 8vh;
      transform: translateX(-50%);
      width: min(1200px, 94vw);
      height: 70vh;
      z-index: 10;
    }

    .castle-glow {
      position: absolute;
      left: 50%;
      bottom: 8%;
      transform: translateX(-50%);
      width: 78%;
      height: 56%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(170,185,230,.12), rgba(240,200,120,.05), transparent 72%);
      filter: blur(30px);
      z-index: 0;
    }

    .wall {
      position: absolute;
      border: 4px solid rgba(195,204,222,.95);
      box-shadow: inset 0 0 18px rgba(255,255,255,.05), 0 0 20px rgba(0,0,0,.18);
      background: linear-gradient(to bottom, #959daa 0%, #737c89 18%, #535d69 52%, #36404b 78%, #232a33 100%);
    }

    .back-wall-left, .back-wall-right {
      bottom: 0;
      width: 17%;
      height: 48%;
      z-index: 5;
      border-radius: 4px;
    }

    .back-wall-left { left: 18%; }
    .back-wall-right { right: 18%; }

    .bridge {
      position: absolute;
      left: 50%;
      bottom: 39%;
      transform: translateX(-50%);
      width: 56%;
      height: 7%;
      z-index: 6;
      border-radius: 4px;
    }

    .bridge.wall {
      background: linear-gradient(to bottom, #9ba3af, #6a7380 56%, #404855 100%);
    }

    .front-wall {
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 52%;
      height: 30%;
      z-index: 8;
      border-radius: 4px;
    }

    .center-keep {
      position: absolute;
      left: 50%;
      bottom: 24%;
      transform: translateX(-50%);
      width: 16%;
      height: 62%;
      z-index: 7;
      border-radius: 4px;
    }

    .side-tower {
      position: absolute;
      bottom: 0;
      width: 18%;
      height: 74%;
      z-index: 4;
      border-radius: 4px;
    }

    .side-tower.left { left: 4%; }
    .side-tower.right { right: 4%; }

    .side-tower::before,
    .back-wall-left::before,
    .back-wall-right::before,
    .front-wall::before,
    .center-keep::before {
      content: "";
      position: absolute;
      left: -4px;
      top: -22px;
      width: calc(100% + 8px);
      height: 22px;
      background:
        linear-gradient(135deg, transparent 10px, rgba(170,179,194,.96) 0) top left,
        linear-gradient(225deg, transparent 10px, rgba(170,179,194,.96) 0) top right,
        linear-gradient(315deg, transparent 10px, rgba(170,179,194,.96) 0) bottom right,
        linear-gradient(45deg, transparent 10px, rgba(170,179,194,.96) 0) bottom left;
      background-size: 50% 50%;
      background-repeat: no-repeat;
    }

    .spire {
      position: absolute;
      width: 0;
      height: 0;
      border-left: 44px solid transparent;
      border-right: 44px solid transparent;
      border-bottom: 120px solid #262b38;
      z-index: 9;
      filter: drop-shadow(0 0 10px rgba(0,0,0,.35));
    }

    .spire.small {
      border-left-width: 34px;
      border-right-width: 34px;
      border-bottom-width: 96px;
    }

    .spire.left { left: 7.8%; bottom: 77%; }
.spire.right { right: 7.8%; bottom: 77%; }
.spire.mid-left { left: 25.6%; bottom: 51%; }
.spire.mid-right { right: 25.6%; bottom: 51%; }
.spire.center { left: 50%; bottom: 88%; transform: translateX(-50%); }

    .cap {
      position: absolute;
      width: 12px;
      height: 28px;
      border-radius: 6px 6px 0 0;
      background: linear-gradient(to bottom, #efddaa, #c79d52);
      z-index: 10;
      box-shadow: 0 0 12px rgba(239,221,170,.24);
    }

    .cap.left { left: 11.1%; bottom: 95.3%; }
.cap.right { right: 11.1%; bottom: 95.3%; }
.cap.mid-left { left: 28.1%; bottom: 63%; }
.cap.mid-right { right: 28.1%; bottom: 63%; }
.cap.center { left: 50%; bottom: 108%; transform: translateX(-50%); }
    .flagpole {
      position: absolute;
      width: 3px;
      height: 86px;
      background: rgba(230,235,245,.95);
      z-index: 10;
    }

    .flagpole::after {
      content: "";
      position: absolute;
      left: 3px;
      top: 10px;
      width: 34px;
      height: 16px;
      background: linear-gradient(90deg, #6c1c29, #972b39);
      clip-path: polygon(0 0, 100% 18%, 82% 50%, 100% 82%, 0 100%);
      animation: wave 2.2s infinite ease-in-out;
    }

    .flagpole.left { left: 11.2%; bottom: 79%; }
.flagpole.right { right: 11.2%; bottom: 79%; }
.flagpole.center { left: 50%; bottom: 90%; transform: translateX(-50%); }
    @keyframes wave {
      0%,100% { transform: skewY(0deg); }
      50% { transform: skewY(7deg); }
    }

    .window {
      position: absolute;
      width: 24px;
      height: 74px;
      border-radius: 14px 14px 4px 4px;
      background: linear-gradient(to bottom, var(--fire1), var(--fire2) 42%, var(--fire3) 100%);
      border: 2px solid rgba(235,220,175,.9);
      box-shadow: 0 0 18px rgba(240,194,104,.34);
      z-index: 9;
    }

    .round-window {
      position: absolute;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: radial-gradient(circle, #fff, #f1ddb0, #d08d44);
      border: 2px solid rgba(235,220,175,.9);
      box-shadow: 0 0 14px rgba(240,194,104,.28);
      z-index: 9;
    }

.door-row {
  position: absolute;
  left: 50%;
  bottom: 0.5%;
  transform: translateX(-50%);
  width: 62%;
  display: flex;
  justify-content: center;
  gap: 24px;
  align-items: end;
  z-index: 12;
  pointer-events: none;
}

    .door {
      position: relative;
      pointer-events: auto;
      cursor: pointer;
      display: flex;
      align-items: end;
      justify-content: center;
      text-align: center;
      padding: 10px;
      color: #f5f1e6;
      font-size: 14px;
      font-weight: 800;
      border: 4px solid rgba(215,191,133,.92);
      box-shadow: 0 0 20px rgba(0,0,0,.25), inset 0 0 14px rgba(255,255,255,.04);
      transition: transform .22s ease, filter .22s ease, box-shadow .22s ease;
      overflow: hidden;
      background:
        linear-gradient(to bottom, rgba(255,255,255,.08), rgba(255,255,255,.02)),
        linear-gradient(to bottom, #5d4832, #382b1d 46%, #181109 100%);
    }

    .door::before {
      content: "";
      position: absolute;
      inset: 4px;
      border-radius: inherit;
      background:
        linear-gradient(to bottom, rgba(255,255,255,.10), rgba(255,255,255,.02)),
        repeating-linear-gradient(90deg, rgba(255,255,255,.03) 0 2px, transparent 2px 18px);
      pointer-events: none;
    }

    .door::after {
      content: "";
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: radial-gradient(circle, #fff5d4, #d5a64d);
      box-shadow: 0 0 10px rgba(213,166,77,.6);
    }

    .door:hover {
      transform: translateY(-6px) scale(1.03);
      filter: brightness(1.05);
      box-shadow: 0 0 28px rgba(0,0,0,.3), 0 0 16px rgba(235,220,175,.10), inset 0 0 14px rgba(255,255,255,.05);
    }

   .door-label {
  width: 100%;
  padding: 4px 6px;
  line-height: 1.2;
  border-radius: 10px;
  background: rgba(8, 12, 22, .42);
  border: 1px solid rgba(255,255,255,.08);
  position: relative;
  z-index: 2;

  font-size: 11px;           /* 字体变小 */
  text-align: center;

  display: -webkit-box;
  -webkit-line-clamp: 2;     /* 限制最多两行 */
  -webkit-box-orient: vertical;
  overflow: hidden;
}

    .status-tag {
      position: absolute;
      top: 7px;
      right: 7px;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(0,0,0,.3);
      border: 1px solid rgba(255,255,255,.12);
      z-index: 2;
    }

    .door.locked {
      filter: grayscale(.2) brightness(.82);
    }

    .door.cleared .status-tag {
      background: rgba(50,120,76,.42);
      color: #e2ffe9;
    }

    .trial-door {
      width: 10.5%;
      height: 100px;
      border-radius: 28px 28px 10px 10px;
    }

    .final-door {
      position: absolute;
      left: 50%;
      bottom: 32%;
      transform: translateX(-50%);
      width: 14%;
      height: 128px;
      border-radius: 24px 24px 10px 10px;
      z-index: 11;
      background:
        linear-gradient(to bottom, rgba(255,255,255,.10), rgba(255,255,255,.03)),
        linear-gradient(to bottom, #6b573b, #45331f 44%, #1c140c 100%);
      box-shadow: 0 0 20px rgba(0,0,0,.28), 0 0 18px rgba(235,220,175,.10), inset 0 0 14px rgba(255,255,255,.05);
    }

    .final-door:hover {
      transform: translateX(-50%) translateY(-6px) scale(1.03);
    }

    .hint {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      z-index: 25;
      background: rgba(8, 12, 24, .76);
      border: 1px solid rgba(255,255,255,.10);
      padding: 12px 20px;
      border-radius: 999px;
      color: #e8edff;
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 14px rgba(0,0,0,.18);
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(5, 7, 14, .84);
      z-index: 60;
      padding: 18px;
    }

    .modal.show {
      display: flex;
    }

    .modal-card {
      position: relative;
      width: min(1120px, 96vw);
      max-height: 92vh;
      overflow: auto;
      border-radius: 22px;
      padding: 24px;
      background:
        linear-gradient(180deg, rgba(17,22,38,.98), rgba(10,14,24,.98)),
        radial-gradient(circle at top right, rgba(255,255,255,.06), transparent 30%);
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: 0 0 38px rgba(0,0,0,.3);
    }

    .close-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,.08);
      color: #fff;
      font-size: 22px;
      cursor: pointer;
    }

    .level-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .level-title {
      font-size: 28px;
      font-weight: 900;
      color: #ead7a7;
    }

    .level-desc {
      margin-top: 8px;
      color: #e4eaff;
      line-height: 1.7;
      font-size: 15px;
      max-width: 760px;
    }

    .battle-grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 18px;
      margin-top: 18px;
    }

    .box {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 18px;
      padding: 18px;
    }

    .role-area {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      align-items: stretch;
    }

    .character-card {
      min-height: 320px;
      padding: 16px;
      border-radius: 16px;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.08);
      position: relative;
      overflow: hidden;
    }

    .character-name {
      font-size: 20px;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .arena {
      position: relative;
      height: 170px;
      margin: 8px 0 12px;
      border-radius: 16px;
      background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,.07), transparent 40%),
        linear-gradient(to bottom, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border: 1px solid rgba(255,255,255,.07);
      overflow: hidden;
    }

    .fighter {
      position: absolute;
      bottom: 16px;
      font-size: 74px;
      transition: transform .25s ease, filter .25s ease;
      filter: drop-shadow(0 0 10px rgba(255,255,255,.12));
    }

    .fighter.hero {
      left: 20px;
    }

    .fighter.enemy {
      right: 20px;
      transform: scaleX(-1);
    }

    .fighter.hit {
      animation: hitFlash .35s linear;
    }

    .fighter.attack-hero {
      animation: slashForward .35s ease;
    }

    .fighter.attack-enemy {
      animation: enemyRush .35s ease;
    }

    @keyframes slashForward {
      0% { transform: translateX(0); }
      45% { transform: translateX(18px) scale(1.05); }
      100% { transform: translateX(0); }
    }

    @keyframes enemyRush {
      0% { transform: scaleX(-1) translateX(0); }
      45% { transform: scaleX(-1) translateX(18px) scale(1.05); }
      100% { transform: scaleX(-1) translateX(0); }
    }

    @keyframes hitFlash {
      0%,100% { filter: drop-shadow(0 0 10px rgba(255,255,255,.14)); }
      50% { filter: brightness(1.7) drop-shadow(0 0 18px rgba(241,180,95,.7)); }
    }

    .effect-text {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 18px;
      font-weight: 900;
      color: #f1d495;
      text-shadow: 0 0 10px rgba(241,201,120,.45);
      opacity: 0;
      pointer-events: none;
    }

    .effect-text.show {
      animation: floatText .8s ease;
    }

    @keyframes floatText {
      0% { opacity: 0; transform: translateX(-50%) translateY(12px) scale(.9); }
      20% { opacity: 1; }
      100% { opacity: 0; transform: translateX(-50%) translateY(-18px) scale(1.08); }
    }

    .bar {
      width: 100%;
      height: 16px;
      border-radius: 999px;
      background: rgba(255,255,255,.10);
      overflow: hidden;
      margin-top: 10px;
    }

    .bar-fill {
      height: 100%;
      transition: width .35s ease;
    }

    .hp-fill {
      background: linear-gradient(90deg, #4ed481, #2a9a57);
      box-shadow: 0 0 14px rgba(78,212,129,.25);
    }

    .mp-fill {
      background: linear-gradient(90deg, #7ca7ff, #4569d1);
      box-shadow: 0 0 14px rgba(124,167,255,.25);
    }

    .bar-text {
      margin-top: 6px;
      font-size: 13px;
      color: #dbe4ff;
    }

    .skills {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .btn {
      border: none;
      cursor: pointer;
      border-radius: 14px;
      padding: 12px 14px;
      color: #fff;
      font-weight: 800;
      transition: transform .18s, filter .18s;
      background: linear-gradient(135deg, #39476b, #556892);
    }

    .btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.06);
    }

    .btn:disabled {
      opacity: .5;
      cursor: not-allowed;
      transform: none;
      filter: none;
    }

    .btn.attack { background: linear-gradient(135deg, #7a2430, #b24a3b); }
    .btn.skill { background: linear-gradient(135deg, #415383, #6c7ea8); }
    .btn.potion { background: linear-gradient(135deg, #2e6b58, #40906a); }
    .btn.shield { background: linear-gradient(135deg, #35598c, #5079b6); }
    .btn.next { background: linear-gradient(135deg, #e8d29b, #ba944e); color: #2c2110; }

    .log {
      height: 360px;
      overflow: auto;
      margin-top: 12px;
      padding-right: 6px;
    }

    .log-item {
      background: rgba(255,255,255,.04);
      border-left: 4px solid #7897d5;
      padding: 10px 12px;
      border-radius: 10px;
      margin-bottom: 10px;
      line-height: 1.6;
      color: #edf1ff;
      font-size: 14px;
    }

    .log-item.good { border-left-color: #2aa35f; }
    .log-item.bad { border-left-color: #b24a3b; }
    .log-item.magic { border-left-color: #8aa3ff; }
    .log-item.warn { border-left-color: #c89f4e; }

    .info-list {
      margin-top: 14px;
      display: grid;
      gap: 10px;
    }

    .info-item {
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.07);
      color: #edf1ff;
      line-height: 1.7;
    }

    .reward-box {
      margin-top: 16px;
      padding: 16px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(232,210,155,.10), rgba(255,255,255,.04));
      border: 1px solid rgba(232,210,155,.22);
      color: #f1e3be;
    }

    .center-actions {
      display: flex;
      justify-content: center;
      gap: 2px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .final-reward-screen {
      text-align: center;
      padding: 18px 8px 8px;
    }

    .big-gem {
      font-size: 124px;
      animation: gemFloat 2.5s ease-in-out infinite;
      filter: drop-shadow(0 0 24px rgba(232,210,155,.25));
      margin: 16px 0;
    }

    .glow-text {
      background: linear-gradient(90deg, #fff, #ead7a5, #dfe8ff, #fff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    @keyframes gemFloat {
      0%,100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-10px) scale(1.05); }
    }

    @media (max-width: 1100px) {
      .door-row {
        width: 78%;
      }
      .trial-door {
         width: 120px;   /* 改成固定值 */
  height: 140px;
      }
    }

    @media (max-width: 980px) {
      .battle-grid { grid-template-columns: 1fr; }
      .role-area { grid-template-columns: 1fr; }
      .title-box { min-width: auto; width: 100%; }
      .castle-wrap { width: 98vw; height: 62vh; }

<body>
  <div class="sky" id="sky"></div>
  <div class="dusts" id="dusts"></div>
  <div class="moon"></div>

  <div class="topbar">
    <div class="panel title-box">
      <div class="title">🏰 西浦学生升学之路 · 暗夜古堡试炼 🏰</div>
      <div class="subtitle">
        月光笼罩的古老城堡深处，藏着五扇封印之门。依次穿越学业规划、语言考试、背景提升、申请冲刺，最终开启荣耀圣殿。

    <div class="panel status">

      <div class="stat">
        <div class="stat-label">获得徽印</div>
        <div class="stat-value" id="gemCount">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">主角等级</div>
        <div class="stat-value" id="playerLevel">1</div>
      </div>
      <div class="stat">
        <div class="stat-label">药水数量</div>
        <div class="stat-value" id="potionCount">4</div>
      </div>
    </div>
  </div>

  <div class="scene">
    <div class="road"></div>

    <div class="castle-wrap">
      <div class="castle-glow"></div>

      <div class="wall side-tower left"></div>
      <div class="wall side-tower right"></div>

      <div class="wall back-wall-left"></div>
      <div class="wall back-wall-right"></div>

      <!-- <div class="wall bridge"></div> -->
      <div class="wall center-keep"></div>
      <div class="wall front-wall"></div>

      <div class="spire left"></div>
      <div class="spire right"></div>
      <div class="spire mid-left small"></div>
      <div class="spire mid-right small"></div>
      <div class="spire center"></div>

      <div class="cap left"></div>
      <div class="cap right"></div>
      <div class="cap mid-left"></div>
      <div class="cap mid-right"></div>
      <div class="cap center"></div>

      <div class="flagpole left"></div>
      <div class="flagpole right"></div>
      <div class="flagpole center"></div>

      <div class="round-window" style="left:11%; bottom:55%;"></div>
      <div class="window" style="left:11.5%; bottom:18%;"></div>

      <div class="round-window" style="left:11%; bottom:55%;"></div>
<div class="window" style="left:11.5%; bottom:18%;"></div>

<div class="round-window" style="left:48.7%; bottom:61%;"></div>

<div class="round-window" style="right:11%; bottom:56%;"></div>
<div class="window" style="right:11.5%; bottom:18%;"></div>

      <div class="door final-door locked" id="finalDoor">
        <div class="status-tag">最终门</div>
        <div class="door-label">圣殿之门</div>
      </div>

      <div class="door-row">
        <div class="door trial-door" data-level="0">
          <div class="status-tag">第1关</div>
          <div class="door-label">规划回廊</div>
        </div>

        <div class="door trial-door locked" data-level="1">
          <div class="status-tag">未解锁</div>
          <div class="door-label">语言高塔</div>
        </div>

        <div class="door trial-door locked" data-level="2">
          <div class="status-tag">未解锁</div>
          <div class="door-label">履历藏书阁</div>
        </div>

        <div class="door trial-door locked" data-level="3">
          <div class="status-tag">未解锁</div>
          <div class="door-label">终局审判庭</div>
        </div>
      </div>
    </div>

    <div class="mist"></div>
    <div class="ground"></div>
  </div>

  <div class="hint">
    点击古堡之门开始试炼。穿越四重挑战后，中央圣殿之门将被月光唤醒。
  </div>

  <div class="modal" id="gameModal">
    <div class="modal-card">
      <button class="close-btn" id="closeModal">×</button>
      <div id="gameContent"></div>
    </div>
  </div>

  <script>
    const gameState = {
      gems: 0,
      cleared: [false, false, false, false],
      level: 1,
      potions: 4,
      shield: 0,
      currentStage: null,
      inBattle: false,
      hero: null,
      enemy: null,
      effectText: ""
    };

    const stages = [
      {
        id: 0,
        title: "第一门：规划回廊",
        subtitle: "先斩断拖延阴影，点亮升学旅程的第一盏灯。",
        gemReward: 1,
        enemy: {
          name: "拖延幽影",
          icon: "👾",
          hp: 70,
          mp: 20,
          minAtk: 6,
          maxAtk: 10,
          skillName: "迟滞缠绕",
          skillChance: 0.18
        },
        tips: [
          "越早开始规划，越容易把主动权握在自己手里。",
          "这一关象征从迷茫走向清晰与行动。"
        ]
      },
      {
        id: 1,
        title: "第二门：语言高塔",
        subtitle: "穿越高塔回音，练出稳定而扎实的语言能力。",
        gemReward: 1,
        enemy: {
          name: "词雾魔龙",
          icon: "🐲",
          hp: 88,
          mp: 24,
          minAtk: 7,
          maxAtk: 12,
          skillName: "词汇冲击",
          skillChance: 0.2
        },
        tips: [
          "语言提高依赖长期积累，不靠短时间爆发。",
          "这一关象征表达能力、理解力与基础实力。"
        ]
      },
      {
        id: 2,
        title: "第三门：履历藏书阁",
        subtitle: "让自己不只是分数，而是一份有故事的履历。",
        gemReward: 1,
        enemy: {
          name: "空白石像",
          icon: "🗿",
          hp: 102,
          mp: 26,
          minAtk: 8,
          maxAtk: 13,
          skillName: "空白撞击",
          skillChance: 0.22
        },
        tips: [
          "项目、实习、科研与活动经历都会增加你的辨识度。",
          "这一关象征成长路径、个人亮点与竞争力。"
        ]
      },
      {
        id: 3,
        title: "第四门：终局审判庭",
        subtitle: "最后冲刺，打败期限魔王，完成申请的最终审判。",
        gemReward: 1,
        enemy: {
          name: "DDL领主",
          icon: "😈",
          hp: 120,
          mp: 30,
          minAtk: 9,
          maxAtk: 15,
          skillName: "截止压迫",
          skillChance: 0.24
        },
        tips: [
          "最后一关考验执行力、细节完整度和提交节奏。",
          "这一关象征正式申请中的决胜时刻。"
        ]
        
      }
    ];

    const sky = document.getElementById("sky");
    const dusts = document.getElementById("dusts");
    const gameModal = document.getElementById("gameModal");
    const gameContent = document.getElementById("gameContent");
    const closeModal = document.getElementById("closeModal");
    const clearCountEl = document.getElementById("clearCount");
    const gemCountEl = document.getElementById("gemCount");
    const playerLevelEl = document.getElementById("playerLevel");
    const potionCountEl = document.getElementById("potionCount");
    const finalDoor = document.getElementById("finalDoor");

    function random(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function createSky() {
      for (let i = 0; i < 50; i++) {
        const star = document.createElement("div");
        star.className = "star";
        const s = Math.random() * 3 + 1;
        star.style.width = s + "px";
        star.style.height = s + "px";
        star.style.left = Math.random() * 100 + "vw";
        star.style.top = Math.random() * 78 + "vh";
        star.style.animationDelay = Math.random() * 4 + "s";
        sky.appendChild(star);
      }

      for (let i = 0; i < 10; i++) {
        const d = document.createElement("div");
        d.className = "dust";
        d.style.left = Math.random() * 100 + "vw";
        d.style.top = (48 + Math.random() * 24) + "vh";
        d.style.animationDuration = (8 + Math.random() * 6) + "s";
        d.style.animationDelay = Math.random() * 8 + "s";
        dusts.appendChild(d);
      }
    }

    function updateHUD() {
      clearCountEl.textContent = `${gameState.cleared.filter(Boolean).length} / 4`;
      gemCountEl.textContent = gameState.gems;
      playerLevelEl.textContent = gameState.level;
      potionCountEl.textContent = gameState.potions;

      document.querySelectorAll(".door[data-level]").forEach(door => {
        const idx = Number(door.dataset.level);
        door.classList.remove("locked", "cleared");
        const tag = door.querySelector(".status-tag");

        if (gameState.cleared[idx]) {
          door.classList.add("cleared");
          tag.textContent = "已通关";
        } else if (idx > 0 && !gameState.cleared[idx - 1]) {
          door.classList.add("locked");
          tag.textContent = "未解锁";
        } else {
          tag.textContent = `第${idx + 1}关`;
        }
      });

      const allClear = gameState.cleared.every(Boolean);
      finalDoor.classList.toggle("locked", !allClear);
      finalDoor.classList.toggle("cleared", allClear);
      finalDoor.querySelector(".status-tag").textContent = allClear ? "已开启" : "最终门";
    }

    function canOpenStage(index) {
      if (index === 0) return true;
      return gameState.cleared[index - 1];
    }

    function openModal(html) {
      gameContent.innerHTML = html;
      gameModal.classList.add("show");
    }

    function closeGameModal() {
      gameModal.classList.remove("show");
    }

    closeModal.addEventListener("click", closeGameModal);
    gameModal.addEventListener("click", e => {
      if (e.target === gameModal) closeGameModal();
    });

    function buildStageIntro(stage) {
      const rewardText = gameState.cleared[stage.id]
        ? `<div class="reward-box">你已经通过这道封印之门，可以再次挑战，但不会重复获得徽印。</div>`
        : `<div class="reward-box">通关奖励：<b>${stage.gemReward} 枚荣耀徽印</b> + 升级 + 有概率额外获得一瓶药水。</div>`;

      return `
        <div class="level-header">
          <div>
            <div class="level-title">${stage.title}</div>
            <div class="level-desc">${stage.subtitle}</div>
          </div>
          <div class="panel">难度：暗夜古堡轻闯版</div>
        </div>

        <div class="battle-grid">
          <div class="box">
            <div class="character-name">本关守卫：${stage.enemy.name}</div>
            <div style="font-size:72px;text-align:center;margin:10px 0;">${stage.enemy.icon}</div>
            <div class="info-list">
              <div class="info-item">生命值：${stage.enemy.hp}</div>
              <div class="info-item">攻击范围：${stage.enemy.minAtk} ~ ${stage.enemy.maxAtk}</div>
              <div class="info-item">特殊招式：${stage.enemy.skillName}</div>
            </div>
          </div>

          <div class="box">
            <div class="character-name">封印含义</div>
            <div class="info-list">
              ${stage.tips.map(t => `<div class="info-item">✦ ${t}</div>`).join("")}
            </div>
            ${rewardText}
          </div>
        </div>

        <div class="center-actions">
          <button class="btn next" onclick="startBattle(${stage.id})">进入试炼</button>
        </div>
      `;
    }

    function openStage(index) {
      if (!canOpenStage(index)) {
        alert("这扇门还没有解锁，请先通过前一关。");
        return;
      }
      gameState.currentStage = stages[index];
      openModal(buildStageIntro(stages[index]));
    }

    function createHero() {
      const levelBonus = (gameState.level - 1) * 10;
      return {
        name: "月夜勇者",
        icon: "🧝‍♀️",
        hp: 120 + levelBonus,
        maxHp: 120 + levelBonus,
        mp: 60 + gameState.level * 8,
        maxMp: 60 + gameState.level * 8,
        minAtk: 14 + gameState.level * 2,
        maxAtk: 22 + gameState.level * 2
      };
    }

    function cloneEnemy(enemy) {
      return { ...enemy, maxHp: enemy.hp, maxMp: enemy.mp };
    }

    function addLog(text, type = "") {
      const log = document.getElementById("battleLog");
      if (!log) return;
      const item = document.createElement("div");
      item.className = `log-item ${type}`;
      item.innerHTML = text;
      log.prepend(item);
    }

    function battleHTML() {
      const h = gameState.hero;
      const e = gameState.enemy;
      return `
        <div class="level-header">
          <div>
            <div class="level-title">${gameState.currentStage.title} · 试炼进行中</div>
            <div class="level-desc">月光照亮前路，战斗已开始。</div>
          </div>
          <div class="panel">护盾：${gameState.shield}</div>
        </div>

        <div class="battle-grid">
          <div class="box">
            <div class="role-area">
              <div class="character-card">
                <div class="character-name">${h.name}</div>
                <div class="arena">
                  <div class="fighter hero" id="heroSprite">${h.icon}</div>
                  <div class="effect-text" id="heroEffect">${gameState.effectText || ""}</div>
                </div>
                <div class="bar"><div class="bar-fill hp-fill" style="width:${(h.hp/h.maxHp)*100}%"></div></div>
                <div class="bar-text">HP：${h.hp} / ${h.maxHp}</div>
                <div class="bar"><div class="bar-fill mp-fill" style="width:${(h.mp/h.maxMp)*100}%"></div></div>
                <div class="bar-text">MP：${h.mp} / ${h.maxMp}</div>
              </div>

              <div class="character-card">
                <div class="character-name">${e.name}</div>
                <div class="arena">
                  <div class="fighter enemy" id="enemySprite">${e.icon}</div>
                  <div class="effect-text" id="enemyEffect"></div>
                </div>
                <div class="bar"><div class="bar-fill hp-fill" style="width:${Math.max(0,(e.hp/e.maxHp)*100)}%"></div></div>
                <div class="bar-text">HP：${Math.max(0,e.hp)} / ${e.maxHp}</div>
                <div class="bar"><div class="bar-fill mp-fill" style="width:${Math.max(0,(e.mp/e.maxMp)*100)}%"></div></div>
                <div class="bar-text">MP：${Math.max(0,e.mp)} / ${e.maxMp}</div>
              </div>
            </div>

            <div class="skills">
              <button class="btn attack" onclick="playerAttack()">暗刃斩击</button>
              <button class="btn skill" onclick="useSkill('combo')" ${h.mp < 12 ? "disabled" : ""}>月影连斩（12MP）</button>
              <button class="btn shield" onclick="useSkill('shield')" ${h.mp < 10 ? "disabled" : ""}>圣辉护盾（10MP）</button>
              <button class="btn potion" onclick="usePotion()" ${gameState.potions <= 0 ? "disabled" : ""}>恢复药水（${gameState.potions}）</button>
            </div>
          </div>

          <div class="box">
            <div class="character-name">战斗日志</div>
            <div class="log" id="battleLog"></div>
          </div>
        </div>
      `;
    }

    function renderBattle(effectText = "") {
      gameState.effectText = effectText;
      openModal(battleHTML());
      if (effectText) {
        const eff = document.getElementById("heroEffect");
        if (eff) eff.classList.add("show");
      }
    }

    function animateAttack(attackerId, targetId, text = "") {
      const attacker = document.getElementById(attackerId);
      const target = document.getElementById(targetId);
      const effect = targetId === "enemySprite" ? document.getElementById("enemyEffect") : document.getElementById("heroEffect");

      if (attacker) attacker.classList.add(attackerId === "heroSprite" ? "attack-hero" : "attack-enemy");
      if (target) target.classList.add("hit");
      if (effect && text) {
        effect.textContent = text;
        effect.classList.add("show");
      }

      setTimeout(() => {
        if (attacker) attacker.classList.remove("attack-hero", "attack-enemy");
        if (target) target.classList.remove("hit");
        if (effect) effect.classList.remove("show");
      }, 360);
    }

    function startBattle(stageId) {
      const stage = stages[stageId];
      gameState.currentStage = stage;
      gameState.hero = createHero();
      gameState.enemy = cloneEnemy(stage.enemy);
      gameState.shield = 0;
      gameState.inBattle = true;
      renderBattle();
      addLog(`你进入 <b>${stage.title}</b>，守门者是 <b>${stage.enemy.name}</b>。`, "warn");
      addLog(`月光洒下，这一战会比想象中更轻松。`, "good");
    }

    function enemyTurn() {
      if (!gameState.inBattle) return;
      const hero = gameState.hero;
      const enemy = gameState.enemy;
      if (hero.hp <= 0 || enemy.hp <= 0) return;

      let damage = random(enemy.minAtk, enemy.maxAtk);
      let skillUsed = false;

      if (Math.random() < enemy.skillChance && enemy.mp >= 8) {
        enemy.mp -= 8;
        damage += 4;
        skillUsed = true;
      }

      if (gameState.shield > 0) {
        const blocked = Math.min(gameState.shield, Math.floor(damage * 0.6));
        damage -= blocked;
        gameState.shield -= blocked;
        addLog(`🛡️ 圣辉护盾抵消了 <b>${blocked}</b> 点伤害。`, "good");
      }

      hero.hp -= damage;
      if (hero.hp < 0) hero.hp = 0;

      renderBattle();
      animateAttack("enemySprite", "heroSprite", `-${damage}`);

      if (skillUsed) {
        addLog(`👹 <b>${enemy.name}</b> 施放 <b>${enemy.skillName}</b>，造成 <b>${damage}</b> 点伤害。`, "bad");
      } else {
        addLog(`👹 <b>${enemy.name}</b> 发起冲击，造成 <b>${damage}</b> 点伤害。`, "bad");
      }

      if (hero.hp <= 0) {
        setTimeout(renderBattleLose, 420);
      } else {
        addLog(`轮到你反击。`, "warn");
      }
    }

    function playerAttack() {
      if (!gameState.inBattle) return;
      const hero = gameState.hero;
      const enemy = gameState.enemy;

      let damage = random(hero.minAtk, hero.maxAtk);
      const crit = Math.random() < 0.28;
      if (crit) damage = Math.floor(damage * 1.5);

      enemy.hp -= damage;
      if (enemy.hp < 0) enemy.hp = 0;

      renderBattle();
      animateAttack("heroSprite", "enemySprite", crit ? `暴击 -${damage}` : `-${damage}`);

      addLog(`⚔️ 你施展暗刃攻击 ${crit ? "并触发<b>暴击</b>" : ""}，造成 <b>${damage}</b> 点伤害。`, "good");

      if (enemy.hp <= 0) {
        setTimeout(renderBattleWin, 420);
      } else {
        setTimeout(enemyTurn, 520);
      }
    }

    function useSkill(type) {
      if (!gameState.inBattle) return;
      const hero = gameState.hero;
      const enemy = gameState.enemy;

      if (type === "combo") {
        if (hero.mp < 12) return;
        hero.mp -= 12;
        const damage = random(hero.minAtk + 10, hero.maxAtk + 16);
        enemy.hp -= damage;
        if (enemy.hp < 0) enemy.hp = 0;

        renderBattle();
        animateAttack("heroSprite", "enemySprite", `连斩 -${damage}`);
        addLog(`✨ 你施放 <b>月影连斩</b>，造成 <b>${damage}</b> 点伤害。`, "magic");

        if (enemy.hp <= 0) {
          setTimeout(renderBattleWin, 420);
        } else {
          setTimeout(enemyTurn, 520);
        }
      }

      if (type === "shield") {
        if (hero.mp < 10) return;
        hero.mp -= 10;
        const shieldGain = random(14, 22);
        gameState.shield += shieldGain;
        renderBattle();
        addLog(`🛡️ 你施放 <b>圣辉护盾</b>，获得 <b>${shieldGain}</b> 点护盾。`, "magic");
        setTimeout(enemyTurn, 520);
      }
    }

    function usePotion() {
      if (!gameState.inBattle || gameState.potions <= 0) return;
      const hero = gameState.hero;
      const heal = random(28, 42);
      hero.hp = Math.min(hero.maxHp, hero.hp + heal);
      gameState.potions -= 1;
      renderBattle();
      addLog(`🧪 你使用恢复药水，回复 <b>${heal}</b> 点生命。`, "good");
      setTimeout(enemyTurn, 520);
    }

    function renderBattleWin() {
      gameState.inBattle = false;
      const stage = gameState.currentStage;
      let rewardText = "";
      let extraPotion = 0;

      if (!gameState.cleared[stage.id]) {
        gameState.cleared[stage.id] = true;
        gameState.gems += stage.gemReward;
        gameState.level += 1;

        if (Math.random() < 0.75) {
          extraPotion = 1;
          gameState.potions += 1;
        }

        rewardText = `
          <div class="reward-box">
            🎉 首次通关成功。你获得 <b>${stage.gemReward}</b> 枚荣耀徽印，主角升到 <b>${gameState.level}</b> 级
            ${extraPotion ? "，并额外得到 <b>1</b> 瓶药水" : ""}。
          </div>
        `;
      } else {
        rewardText = `
          <div class="reward-box">你再次穿越了这道试炼之门，本次不重复发放徽印。</div>
        `;
      }

      updateHUD();
      const allClear = gameState.cleared.every(Boolean);

      openModal(`
        <div class="level-header">
          <div>
            <div class="level-title">🏆 ${stage.title} 通关成功</div>
            <div class="level-desc">你成功击败了 <b>${stage.enemy.name}</b>，门上的封印已经消散。</div>
          </div>
        </div>

        <div class="box">
          <div class="character-name">通关总结</div>
          <div class="info-list">
            ${stage.tips.map(t => `<div class="info-item">✅ ${t}</div>`).join("")}
          </div>
          ${rewardText}
        </div>

        <div class="center-actions">
          <button class="btn next" onclick="closeGameModal()">返回古堡</button>
          ${allClear ? `<button class="btn" onclick="openFinalReward()">开启圣殿之门</button>` : ``}
        </div>
      `);
    }

    function renderBattleLose() {
      gameState.inBattle = false;
      openModal(`
        <div class="level-header">
          <div>
            <div class="level-title">💥 试炼失败</div>
            <div class="level-desc">月光仍在，你只是暂时后退了一步，再试一次就能穿越封印。</div>
          </div>
        </div>

        <div class="box">
          <div class="character-name">古堡提示</div>
          <div class="info-list">
            <div class="info-item">1. 先普通攻击压低敌人血量。</div>
            <div class="info-item">2. 生命不够时及时使用药水。</div>
            <div class="info-item">3. 月影连斩适合快速收尾。</div>
            <div class="info-item">4. 圣辉护盾可以有效减伤。</div>
          </div>
        </div>

        <div class="center-actions">
          <button class="btn next" onclick="startBattle(${gameState.currentStage.id})">再次挑战</button>
          <button class="btn" onclick="closeGameModal()">返回古堡</button>
        </div>
      `);
    }

    function openFinalReward() {
      if (!gameState.cleared.every(Boolean)) {
        alert("你还没有完成全部四道试炼。");
        return;
      }

      openModal(`
        <div class="final-reward-screen">
          <div class="level-title glow-text">🏰 圣殿之门已开启 🏰</div>
          <div class="big-gem">💎</div>
          <div class="level-desc" style="max-width:840px;margin:0 auto;">
            恭喜你穿越西浦学生升学之路的四道暗夜试炼。<br><br>
            你拿到了象征成长、坚持、行动力与结果力的 <b>荣耀圣徽</b>。
          </div>

          <div class="box" style="margin-top:20px;">
            <div class="character-name">最终奖励面板</div>
            <div class="info-list">
              <div class="info-item">✨ 总徽印数：${gameState.gems}</div>
              <div class="info-item">✨ 最终等级：${gameState.level}</div>
              <div class="info-item">✨ 剩余药水：${gameState.potions}</div>
              <div class="info-item">✨ 荣誉称号：<b>暗夜古堡升学征服者</b></div>
            </div>
          </div>

          <div class="center-actions">
            <button class="btn next" onclick="closeGameModal()">返回古堡</button>
            <button class="btn" onclick="resetGame()">重新开始</button>
          </div>
        </div>
      `);
    }

    function resetGame() {
      gameState.gems = 0;
      gameState.cleared = [false, false, false, false];
      gameState.level = 1;
      gameState.potions = 4;
      gameState.shield = 0;
      gameState.currentStage = null;
      gameState.inBattle = false;
      gameState.hero = null;
      gameState.enemy = null;
      gameState.effectText = "";
      updateHUD();
      closeGameModal();
    }

    document.querySelectorAll(".door[data-level]").forEach(door => {
      door.addEventListener("click", () => {
        openStage(Number(door.dataset.level));
      });
    });

    finalDoor.addEventListener("click", () => {
      if (!gameState.cleared.every(Boolean)) {
        alert("圣殿之门需要先完成全部四关。");
        return;
      }
      openFinalReward();
    });

    createSky();
    updateHUD();

    window.startBattle = startBattle;
    window.playerAttack = playerAttack;
    window.useSkill = useSkill;
    window.usePotion = usePotion;
    window.closeGameModal = closeGameModal;
    window.openFinalReward = openFinalReward;
    window.resetGame = resetGame;
  </script>
</body>
</html>
