<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Y2-2 Crossroads of Destiny: Region Portals</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        /* Mysterious dark forest background */
        body {
            background: radial-gradient(circle at center, #1a2a3a 0%, #0a0f14 100%);
            display: flex; justify-content: center; align-items: flex-start; /* Top aligned for scrolling */
            min-height: 100vh; margin: 0; padding: 40px 20px; color: #e0e6ed;
            overflow-x: hidden;
            overflow-y: auto; /* Enable vertical scroll */
        }

        /* Custom Scrollbar */
        body::-webkit-scrollbar { width: 8px; }
        body::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); }
        body::-webkit-scrollbar-thumb { background: rgba(130, 177, 255, 0.3); border-radius: 10px; }
        body::-webkit-scrollbar-thumb:hover { background: rgba(130, 177, 255, 0.5); }

        .crossroads-scene {
            width: 100%; max-width: 900px;
            position: relative; display: flex; flex-direction: column; align-items: center;
            padding-bottom: 50px; /* Space at bottom */
        }

        /* Top header area */
        .header { text-align: center; margin-bottom: 30px; z-index: 10; }
        .header h2 {
            margin: 0; font-size: 2.2rem; color: #f9d976;
            text-shadow: 0 0 15px rgba(249, 217, 118, 0.5); font-family: 'Georgia', serif;
        }
        .header p { color: #8b9bb4; font-size: 1rem; margin-top: 10px; font-style: italic; }

        /* Two portals container */
        .portals-container {
            display: flex; justify-content: space-between; width: 100%;
            padding: 0 50px; margin-top: 20px; z-index: 1;
        }

        /* General portal styles */
        .portal {
            width: 220px; height: 350px;
            border-radius: 110px 110px 0 0;
            position: relative; transition: all 0.5s ease;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border: 4px solid #2c3e50; background: #0b131a;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8); opacity: 0.6; filter: grayscale(0.8);
        }

        .portal-icon { font-size: 4rem; opacity: 0.5; transition: 0.5s; text-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .portal-name {
            font-size: 1.15rem; font-weight: bold; margin-top: 20px; opacity: 0.5;
            transition: 0.5s; letter-spacing: 1px; text-align: center; padding: 0 15px; line-height: 1.4;
        }

        /* UK Portal (Deep Blue) */
        .portal-uk .portal-name { color: #82b1ff; }
        .portal-uk.active-1 { box-shadow: 0 0 30px rgba(65, 105, 225, 0.4), inset 0 0 30px rgba(65, 105, 225, 0.3); opacity: 0.8; filter: grayscale(0.4); border-color: #4169e1;}
        .portal-uk.active-2 { box-shadow: 0 0 60px rgba(65, 105, 225, 0.6), inset 0 0 60px rgba(65, 105, 225, 0.5); opacity: 0.9; filter: grayscale(0.2); border-color: #5c85ff;}
        .portal-uk.active-3 { box-shadow: 0 0 100px rgba(65, 105, 225, 0.9), inset 0 0 100px rgba(65, 105, 225, 0.8); opacity: 1; filter: grayscale(0); border-color: #82b1ff; background: radial-gradient(circle at bottom, #1a3673, #0b131a);}

        /* HK Portal (Dark Gold) */
        .portal-hk .portal-name { color: #ffd700; }
        .portal-hk.active-1 { box-shadow: 0 0 30px rgba(218, 165, 32, 0.4), inset 0 0 30px rgba(218, 165, 32, 0.3); opacity: 0.8; filter: grayscale(0.4); border-color: #daa520;}
        .portal-hk.active-2 { box-shadow: 0 0 60px rgba(218, 165, 32, 0.6), inset 0 0 60px rgba(218, 165, 32, 0.5); opacity: 0.9; filter: grayscale(0.2); border-color: #ffcc00;}
        .portal-hk.active-3 { box-shadow: 0 0 100px rgba(218, 165, 32, 0.9), inset 0 0 100px rgba(218, 165, 32, 0.8); opacity: 1; filter: grayscale(0); border-color: #ffe066; background: radial-gradient(circle at bottom, #5c4716, #0b131a);}

        .portal[class*="active-"] .portal-icon { opacity: 1; transform: scale(1.1); }
        .portal[class*="active-"] .portal-name { opacity: 1; text-shadow: 0 0 10px currentColor; }

        /* Central magic scroll (Q&A area) */
        .scroll-board {
            margin-top: 40px; width: 550px;
            background: linear-gradient(135deg, #fdf5e6, #f3e5ab);
            border-radius: 10px; padding: 35px; border: 3px solid #c8a165;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 0 20px rgba(200,161,101,0.2);
            color: #3e2723; z-index: 10;
            display: flex; flex-direction: column; align-items: center;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .owl-guide { font-size: 3.5rem; margin-bottom: 10px; }
        .question-text { font-size: 1.15rem; font-weight: bold; text-align: center; margin-bottom: 25px; line-height: 1.5; font-family: "Georgia", serif; }

        .choices { display: flex; flex-direction: column; gap: 15px; width: 100%; }
        .btn-choice {
            background: rgba(255,255,255,0.6); border: 2px solid #c8a165;
            padding: 15px 20px; border-radius: 8px; font-size: 1rem; color: #5d4037;
            font-weight: bold; cursor: pointer; transition: 0.2s; text-align: left;
            line-height: 1.4;
        }
        .btn-choice:hover { background: #fff; transform: scale(1.02); box-shadow: 0 5px 15px rgba(200,161,101,0.4); }

        /* Result Modal (Tarot Card) */
        .result-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center; z-index: 100;
        }

        .tarot-card {
            width: 360px; min-height: 520px; border-radius: 15px; padding: 40px 25px;
            display: flex; flex-direction: column; align-items: center; text-align: center;
            box-shadow: 0 0 50px rgba(255,255,255,0.2); position: relative;
            animation: cardReveal 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes cardReveal { from { transform: scale(0.5) rotateY(90deg); opacity: 0; } to { transform: scale(1) rotateY(0); opacity: 1; } }

        .tarot-uk { background: linear-gradient(135deg, #1a3673, #0b131a); border: 4px solid #82b1ff; color: #e0ebff; }
        .tarot-hk { background: linear-gradient(135deg, #5c4716, #0b131a); border: 4px solid #ffe066; color: #fff3cc; }

        .tarot-title { font-size: 1.4rem; font-weight: bold; border-bottom: 2px dashed currentColor; padding-bottom: 12px; width: 100%; margin-bottom: 25px; font-family: "Georgia", serif;}
        .tarot-icon { font-size: 5.5rem; margin-bottom: 25px; filter: drop-shadow(0 0 15px currentColor); }
        .tarot-desc { font-size: 1rem; line-height: 1.6; text-align: left; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 10px; font-family: "Georgia", serif;}

        .btn-claim {
            margin-top: 30px; background: #fff; color: #000; border: none; padding: 12px 40px;
            border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1rem;
        }
        .btn-claim:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(255,255,255,0.4); }

    </style>
</head>
<body>

<div class="crossroads-scene">
    <div class="header">
        <h2><i class="fas fa-compass"></i> Crossroads of Destiny</h2>
        <p>The portals are dormant. Your choices will manifest the energy required to open them.</p>
    </div>

    <div class="portals-container">
        <div class="portal portal-uk" id="portal-uk">
            <div class="portal-icon">🏰</div>
            <div class="portal-name">Path of Albion (UK)</div>
        </div>
        <div class="portal portal-hk" id="portal-hk">
            <div class="portal-icon">🌃</div>
            <div class="portal-name">Path of the Orient (HK)</div>
        </div>
    </div>

    <div class="scroll-board" id="scrollBoard">
        <div class="owl-guide">🦉</div>
        <div class="question-text" id="qText">Seeking the wisdom of the stars...</div>
        <div class="choices" id="choicesBox"></div>
    </div>
</div>

<div class="result-overlay" id="resultModal">
    <div class="tarot-card" id="tarotCard">
        <div class="tarot-title" id="tarotTitle">Visa Issued</div>
        <div class="tarot-icon" id="tarotIcon">🃏</div>
        <div class="tarot-desc" id="tarotDesc">Description...</div>
        <button class="btn-claim" onclick="closeModal()">Accept Visa & Proceed</button>
    </div>
</div>

<script>
    const questions = [
        {
            q: "Facing the unknown journey of cultivation, where do you wish to go?",
            choices: [
                { text: "Travel across the ocean to immerse myself in authentic western magic academy culture.", type: "uk" },
                { text: "Stay in the familiar Pearl of the Orient, where diet and culture seamlessly connect.", type: "hk" }
            ]
        },
        {
            q: "Where do you plan to unroll your magic scroll after graduation?",
            choices: [
                { text: "Pursue elite prestige, aiming to shine in top global giants or domestic tech titans.", type: "uk" },
                { text: "Seek high-intensity practical internships to rapidly establish roots in Asian finance/tech.", type: "hk" }
            ]
        },
        {
            q: "Which resource is currently more abundant in your inventory?",
            choices: [
                { text: "I have an ample budget of gold coins and wish to experience foreign life more leisurely.", type: "uk" },
                { text: "My time and budget are tactical; I seek cost-effectiveness and rapid employment.", type: "hk" }
            ]
        }
    ];

    let currentQ = 0;
    let scores = { uk: 0, hk: 0 };

    function renderQuestion() {
        if (currentQ >= questions.length) {
            finishJourney();
            return;
        }

        const qData = questions[currentQ];
        document.getElementById('qText').innerHTML = `“${qData.q}”`;
        const choicesBox = document.getElementById('choicesBox');
        choicesBox.innerHTML = '';

        qData.choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.className = 'btn-choice';
            btn.innerHTML = `<i class="fas fa-feather-alt" style="color:#c8a165; margin-right:10px;"></i> ${choice.text}`;
            btn.onclick = () => answerQuestion(choice.type);
            choicesBox.appendChild(btn);
        });
    }

    function answerQuestion(type) {
        scores[type]++;
        const portal = document.getElementById(`portal-${type}`);
        portal.classList.remove('active-1', 'active-2', 'active-3');
        portal.classList.add(`active-${scores[type]}`);

        const scroll = document.getElementById('scrollBoard');
        scroll.style.transform = 'scale(0.9)';
        scroll.style.opacity = '0';

        setTimeout(() => {
            currentQ++;
            renderQuestion();
            scroll.style.transform = 'scale(1)';
            scroll.style.opacity = '1';
        }, 300);
    }

    function finishJourney() {
        document.getElementById('scrollBoard').style.display = 'none';
        const winner = scores.uk > scores.hk ? 'uk' : 'hk';

        document.getElementById(`portal-${winner}`).classList.add('active-3');
        const loser = winner === 'uk' ? 'hk' : 'uk';
        document.getElementById(`portal-${loser}`).style.opacity = '0.2';
        document.getElementById(`portal-${loser}`).style.filter = 'grayscale(1)';

        setTimeout(() => showResult(winner), 800);
    }

    function showResult(winner) {
        const modal = document.getElementById('resultModal');
        const card = document.getElementById('tarotCard');
        const title = document.getElementById('tarotTitle');
        const icon = document.getElementById('tarotIcon');
        const desc = document.getElementById('tarotDesc');

        card.className = `tarot-card tarot-${winner}`;

        if (winner === 'uk') {
            title.innerText = "Visa: Explorer of Albion";
            icon.innerText = "🏰";
            desc.innerHTML = "<b>Your soul resonates with: The United Kingdom</b><br><br>You pursue the prestige of elite academies and orthodox scholarly experiences. With profound heritage and top rankings, prepare your resources and embrace the expansion of your magical horizon!";
        } else {
            title.innerText = "Visa: Pragmatist of the Orient";
            icon.innerText = "🌃";
            desc.innerHTML = "<b>Your soul resonates with: Hong Kong</b><br><br>You are a master of pragmatism. HK offers an electric pace, backed by Asian financial hubs and tech giant resources, providing abundant opportunities for those who seek high efficiency and rapid career ascension!";
        }

        modal.style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('resultModal').style.display = 'none';
        if (window.parent && window.parent !== window) {
            window.parent.postMessage({
                type: "gradquest:node-complete",
                payload: { year: "y2", nodeId: 2 }
            }, "*");
        }
        alert("Prophecy Received: Your regional direction is illuminated! Proceed to define your academic tiers.");
        // If integrating with main index: window.parent.closeGame();
    }

    renderQuestion();

</script>
</body>
</html>
