<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Y3-2 Bureau of Magic: Soul Sealing</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }

        body {
            background: #0f0c20;
            background-image: radial-gradient(circle at 50% 0%, #2e1a47 0%, transparent 60%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px; color: #e2e8f0; overflow: hidden;
        }

        .desk {
            width: 100%; max-width: 650px; height: 85vh;
            display: flex; flex-direction: column; position: relative;
        }

        /* Top Progress Header */
        .header { text-align: center; margin-bottom: 20px; }
        .header h2 { margin: 0; font-size: 1.8rem; color: #d8b4fe; letter-spacing: 1px; font-family: "Georgia", serif;}
        .progress-bar { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; margin-top: 15px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #fde047, #f59e0b); transition: width 0.3s; }

        /* Parchment Stage */
        .parchment-stage {
            flex: 1; position: relative; display: flex; justify-content: center; align-items: center;
            perspective: 1000px;
        }

        .parchment {
            background: #fdf6e3; color: #2c1a0e; width: 90%; max-width: 450px; min-height: 250px;
            padding: 40px 30px; border-radius: 4px; box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            font-size: 1.15rem; line-height: 1.6; font-weight: bold; text-align: left;
            position: absolute; border: 1px solid #d4c5b0;
            font-family: "Georgia", serif;
            /* Paper texture */
            background-image: radial-gradient(rgba(0,0,0,0.05) 1px, transparent 1px);
            background-size: 10px 10px;
            transition: 0.3s;
        }

        .parchment::before {
            content: "“"; font-size: 4rem; color: rgba(0,0,0,0.1); position: absolute; top: 0px; left: 10px; font-family: serif;
        }

        /* Animations */
        .slide-in { animation: slideIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes slideIn {
            0% { transform: translateY(-100vh) rotate(-10deg); opacity: 0; }
            100% { transform: translateY(0) rotate(2deg); opacity: 1; }
        }

        .burn-away { animation: burn 0.6s forwards; }
        @keyframes burn {
            0% { transform: scale(1) rotate(2deg); filter: brightness(1); opacity: 1; }
            40% { transform: scale(1.05) rotate(0deg); filter: brightness(1.5) sepia(1) hue-rotate(-50deg); opacity: 1; }
            100% { transform: scale(0.8) translateY(-50px); filter: brightness(2) sepia(1) hue-rotate(-50deg); opacity: 0; }
        }

        .shake-error { animation: shake 0.4s forwards; }
        @keyframes shake {
            0%, 100% { transform: translateX(0) rotate(2deg); }
            25% { transform: translateX(-15px) rotate(-3deg); }
            75% { transform: translateX(15px) rotate(5deg); }
        }

        /* Stamp Effects */
        .stamp-mark {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(5);
            font-size: 3rem; font-weight: 900; border: 6px solid; border-radius: 10px; padding: 10px 20px;
            opacity: 0; pointer-events: none; z-index: 20; letter-spacing: 2px;
            font-family: "Georgia", serif; text-align: center; line-height: 1.2;
        }
        .stamp-anim { animation: smash 0.4s cubic-bezier(0.1, 2, 0.5, 1) forwards; }
        @keyframes smash {
            0% { transform: translate(-50%, -50%) scale(5); opacity: 0; }
            40% { transform: translate(-50%, -50%) scale(0.8); opacity: 1; }
            60% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1) rotate(-10deg); opacity: 0.9; }
        }

        /* Bottom Seal Buttons */
        .seals-container {
            display: flex; justify-content: space-around; padding: 20px 0; background: rgba(0,0,0,0.3); border-radius: 20px;
        }

        .seal-btn {
            background: linear-gradient(145deg, #1e1b4b, #0f0c20); border: 2px solid; border-radius: 50%;
            width: 100px; height: 100px; display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: 0.15s; box-shadow: 0 10px 20px rgba(0,0,0,0.5), inset 0 2px 5px rgba(255,255,255,0.1);
        }
        .seal-btn:active { transform: scale(0.9) translateY(10px); box-shadow: 0 0px 5px rgba(0,0,0,0.5); }

        .seal-cv { border-color: #38bdf8; color: #38bdf8; }
        .seal-cv:hover { background: rgba(56, 189, 248, 0.1); box-shadow: 0 0 25px rgba(56, 189, 248, 0.4); }

        .seal-ps { border-color: #fde047; color: #fde047; }
        .seal-ps:hover { background: rgba(253, 224, 71, 0.1); box-shadow: 0 0 25px rgba(253, 224, 71, 0.4); }

        .seal-rl { border-color: #d8b4fe; color: #d8b4fe; }
        .seal-rl:hover { background: rgba(216, 180, 254, 0.1); box-shadow: 0 0 25px rgba(216, 180, 254, 0.4); }

        .seal-name { font-size: 1.6rem; font-weight: 900; margin-bottom: 2px; font-family: "Georgia", serif;}
        .seal-desc { font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; text-align: center; line-height: 1.2;}

        /* Rejection Modal */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px);
            display: none; justify-content: center; align-items: center; z-index: 50;
        }
        .modal-card {
            background: #1e1b4b; border: 2px solid #ef4444; border-radius: 16px; padding: 30px;
            width: 90%; max-width: 450px; text-align: center; box-shadow: 0 0 40px rgba(239, 68, 68, 0.3);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .modal-icon { font-size: 3.5rem; color: #ef4444; margin-bottom: 15px; }
        .modal-title { font-size: 1.4rem; font-weight: bold; color: #fff; margin-bottom: 15px; font-family: "Georgia", serif;}
        .modal-desc { color: #cbd5e1; font-size: 1.05rem; line-height: 1.6; margin-bottom: 25px; text-align: left; font-family: "Georgia", serif;}
        .modal-desc b { color: #ef4444; }
        .modal-btn { background: #ef4444; color: #fff; border: none; padding: 12px 30px; border-radius: 30px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.2s;}
        .modal-btn:hover { background: #dc2626; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="desk">
    <div class="header">
        <h2>Bureau of Magic: Artifact Appraisal</h2>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <div class="parchment-stage">
        <div class="parchment slide-in" id="parchment">
            <span id="textBody">Loading dossier...</span>
            <div class="stamp-mark" id="stampMark"></div>
        </div>
    </div>

    <div class="seals-container">
        <div class="seal-btn seal-cv" onclick="slamStamp('cv', '#38bdf8', 'CV<br>Log')">
            <div class="seal-name">CV</div>
            <div class="seal-desc">Objective<br>Facts</div>
        </div>
        <div class="seal-btn seal-ps" onclick="slamStamp('ps', '#fde047', 'PS<br>Soul')">
            <div class="seal-name">PS</div>
            <div class="seal-desc">Subjective<br>Motives</div>
        </div>
        <div class="seal-btn seal-rl" onclick="slamStamp('rl', '#d8b4fe', 'RL<br>Vouch')">
            <div class="seal-name">RL</div>
            <div class="seal-desc">3rd-Party<br>View</div>
        </div>
    </div>
</div>

<div class="modal" id="errorModal">
    <div class="modal-card">
        <div class="modal-icon"><i class="fas fa-exclamation-triangle"></i></div>
        <div class="modal-title">REJECTED! Misplaced Artifact</div>
        <div class="modal-desc" id="errorMsg"></div>
        <button class="modal-btn" onclick="closeModal()">Revoke & Restamp</button>
    </div>
</div>

<script>
    const database = [
        {
            text: "During my SAP internship, I refactored the backend code, increasing system response speed by 25%.",
            target: "cv",
            error: "<b>Too dry for a PS, wrong perspective for an RL.</b><br>This objective statement with clear 'quantified output' is the absolute favorite of a CV (Resume). Use it to quickly showcase your hardcore baseline."
        },
        {
            text: "A setback during a big tech internship made me deeply realize my knowledge bottleneck in distributed systems, sparking the idea of further study.",
            target: "ps",
            error: "<b>CVs strictly reject long subjective sentences!</b><br>Lengthy emotional turning points and motivations take up space and look unprofessional in a CV. This must be placed in your PS (Personal Statement) to tell your hero's journey."
        },
        {
            text: "The student demonstrated outstanding leadership in the 'Advanced Algorithms' group project, always pointing out the core bugs when the team was stuck.",
            target: "rl",
            error: "<b>Do not boast!</b><br>Praising your own 'outstanding leadership' in a PS comes off as arrogant. This kind of third-party evaluation of soft skills is the core function of an RL (Recommendation Letter)!"
        },
        {
            text: "Proficient in programming languages such as Python, Java, C++; skilled in MySQL database management.",
            target: "cv",
            error: "<b>Do not turn your PS into a skill list!</b><br>Emotionless listing of skills belongs exclusively to the CV. Admissions officers do not want to see a grocery list while reading your PS story."
        },
        {
            text: "My long-term vision is to become a top-tier engineer capable of independently leading enterprise-level cloud computing architectures.",
            target: "ps",
            error: "<b>Future visions belong to your inner voice.</b><br>A CV only records your 'past' and 'present', while your 'future' belongs to the ascending climax of your PS."
        },
        {
            text: "What impressed me the most was her stress resistance facing extreme DDLs; she remained highly emotionally stable and produced efficiently.",
            target: "rl",
            error: "<b>Subjective evaluations require third-party endorsement.</b><br>You cannot write 'I am emotionally stable' in your CV. You need a mentor to corroborate your soft skills with specific observations in an RL."
        }
    ];

    let currentIndex = 0;
    let isAnimating = false;

    const parchment = document.getElementById('parchment');
    const textBody = document.getElementById('textBody');
    const stampMark = document.getElementById('stampMark');
    const errorModal = document.getElementById('errorModal');

    function loadParchment() {
        if (currentIndex >= database.length) {
            if (window.parent && window.parent !== window) {
                window.parent.postMessage({
                    type: "gradquest:node-complete",
                    payload: { year: "y3", nodeId: 2 }
                }, "*");
            }
            alert("🎉 Appraisal Complete! You have perfectly mastered the essence of the Document Trinity, earning the [Chief Appraiser] badge!\nProceeding to Y3-3: CV Clinic...");
            return;
        }

        document.getElementById('progressFill').style.width = `${(currentIndex / database.length) * 100}%`;

        parchment.className = "parchment"; // reset
        void parchment.offsetWidth; // trigger reflow

        textBody.innerText = database[currentIndex].text;
        stampMark.style.opacity = '0';
        stampMark.className = 'stamp-mark';

        parchment.classList.add('slide-in');
        isAnimating = false;
    }

    function slamStamp(type, color, label) {
        if (isAnimating) return;
        isAnimating = true;

        const currentData = database[currentIndex];

        // Render stamp mark
        stampMark.innerHTML = label;
        stampMark.style.color = color;
        stampMark.style.borderColor = color;

        // Reset and trigger slam animation
        stampMark.classList.remove('stamp-anim');
        void stampMark.offsetWidth;
        stampMark.classList.add('stamp-anim');

        setTimeout(() => {
            if (type === currentData.target) {
                // Correct: Parchment burns away
                parchment.classList.add('burn-away');
                setTimeout(() => {
                    currentIndex++;
                    loadParchment();
                }, 600);
            } else {
                // Incorrect: Red rejection, parchment shakes
                stampMark.innerHTML = "REJECTED";
                stampMark.style.color = "#ef4444";
                stampMark.style.borderColor = "#ef4444";
                parchment.classList.add('shake-error');

                setTimeout(() => {
                    document.getElementById('errorMsg').innerHTML = currentData.error;
                    errorModal.style.display = 'flex';
                }, 400);
            }
        }, 150); // Timing the judgment with the stamp hitting the paper
    }

    function closeModal() {
        errorModal.style.display = 'none';
        stampMark.style.opacity = '0';
        parchment.classList.remove('shake-error');
        isAnimating = false;
    }

    // Initialize game
    setTimeout(loadParchment, 300);

</script>
</body>
</html>
