<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Y3-4 记忆星图：PS 故事拼接</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }
        
        body { 
            background: radial-gradient(circle at bottom, #1b0b2e 0%, #07030f 100%);
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; padding: 20px; color: #e2e8f0;
        }

        .star-room {
            width: 100%; max-width: 1050px; background: rgba(20, 10, 35, 0.7);
            border: 2px solid #a855f7; border-radius: 24px; padding: 35px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 40px rgba(168, 85, 247, 0.2);
            backdrop-filter: blur(12px); position: relative; overflow: hidden;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h2 { margin: 0 0 10px 0; font-size: 2.3rem; color: #e9d5ff; text-shadow: 0 0 15px rgba(233, 213, 255, 0.5); letter-spacing: 2px;}
        .header p { color: #94a3b8; font-size: 1.05rem; margin: 0; line-height: 1.6;}

        /* --- 散落的星体 (记忆碎片) --- */
        .memory-pool {
            display: flex; justify-content: center; gap: 15px; flex-wrap: wrap;
            background: rgba(0, 0, 0, 0.4); border: 1px dashed #7e22ce; border-radius: 16px;
            padding: 25px; margin-bottom: 40px; min-height: 140px;
        }

        .star-fragment {
            background: linear-gradient(135deg, #4c1d95, #2e1065); border: 2px solid #a855f7;
            border-radius: 12px; padding: 15px; width: 160px; cursor: grab;
            box-shadow: 0 8px 15px rgba(0,0,0,0.5); transition: 0.2s; position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center; text-align: center;
        }
        .star-fragment:hover { transform: translateY(-5px); border-color: #fde047; box-shadow: 0 10px 20px rgba(253, 224, 71, 0.3); }
        .star-fragment:active { cursor: grabbing; transform: scale(0.95); }
        
        .frag-icon { font-size: 2rem; margin-bottom: 8px; color: #d8b4fe; filter: drop-shadow(0 0 5px rgba(216, 180, 254, 0.5)); }
        .frag-title { font-size: 0.95rem; font-weight: bold; color: #f8fafc; margin-bottom: 5px;}
        .frag-desc { font-size: 0.7rem; color: #cbd5e1; line-height: 1.3;}

        /* --- 星座连线区 --- */
        .constellation-area {
            position: relative; width: 100%; height: 350px; margin-bottom: 30px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%"><rect width="100%" height="100%" fill="transparent"/><circle cx="20%" cy="50%" r="2" fill="white" opacity="0.2"/><circle cx="80%" cy="20%" r="1" fill="white" opacity="0.3"/></svg>');
        }

        /* SVG 连线底图 */
        .svg-lines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none;
        }
        .constellation-path {
            fill: none; stroke: #4c1d95; stroke-width: 4; stroke-dasharray: 10, 10; transition: stroke 1s, filter 1s;
        }

        /* 星轨插槽 (5个) */
        .star-slot {
            position: absolute; width: 160px; height: 120px; 
            background: rgba(0,0,0,0.5); border: 2px dashed #7e22ce; border-radius: 16px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 2; transition: 0.3s; transform: translate(-50%, -50%);
        }
        .slot-num { position: absolute; top: -15px; background: #0f172a; border: 2px solid #a855f7; color: #d8b4fe; width: 30px; height: 30px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: 900; z-index: 3; box-shadow: 0 0 10px rgba(168, 85, 247, 0.5);}
        .slot-hint { font-size: 0.8rem; color: #64748b; text-align: center; margin-top: 15px;}
        
        .star-slot.drag-over { background: rgba(168, 85, 247, 0.2); border-color: #d8b4fe; box-shadow: 0 0 30px rgba(168, 85, 247, 0.4); transform: translate(-50%, -50%) scale(1.05); }

        /* W 形状的 5 个坐标定位 (基于百分比) */
        #slot-1 { top: 25%; left: 15%; }
        #slot-2 { top: 75%; left: 32.5%; }
        #slot-3 { top: 25%; left: 50%; }
        #slot-4 { top: 75%; left: 67.5%; }
        #slot-5 { top: 25%; left: 85%; }

        /* 放入节点后的碎片样式 */
        .star-slot .star-fragment { width: 100%; height: 100%; margin: 0; box-shadow: 0 0 20px rgba(168, 85, 247, 0.6); justify-content: center; padding: 10px;}
        .star-slot .frag-icon { font-size: 1.5rem; margin-bottom: 2px; }
        .star-slot .slot-hint { display: none; }

        /* 控制区 */
        .controls { display: flex; justify-content: center; gap: 20px; }
        .btn {
            border: none; padding: 12px 40px; border-radius: 30px; font-size: 1.1rem;
            font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px;
        }
        .btn-illuminate { background: linear-gradient(135deg, #a855f7, #6366f1); color: white; box-shadow: 0 8px 20px rgba(168, 85, 247, 0.4); }
        .btn-illuminate:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(168, 85, 247, 0.6); }

        /* 反馈面板 */
        .feedback-panel {
            margin-top: 25px; background: rgba(15, 23, 42, 0.9); border-left: 5px solid;
            border-radius: 12px; padding: 25px; width: 100%; display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .fb-title { font-size: 1.3rem; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 10px;}
        .fb-desc { color: #cbd5e1; font-size: 1rem; line-height: 1.6; }
        
        .status-error { border-color: #ef4444; } .status-error .fb-title { color: #fca5a5; }
        .status-success { border-color: #fde047; } .status-success .fb-title { color: #fde047; }

        /* 成功点亮星座特效 */
        .constellation-lit .constellation-path { stroke: #fde047; stroke-dasharray: none; filter: drop-shadow(0 0 15px #fde047); }
        .constellation-lit .star-slot { border-color: #fde047; box-shadow: 0 0 30px rgba(253, 224, 71, 0.4); }
        .constellation-lit .star-fragment { border-color: #fff; background: linear-gradient(135deg, #ca8a04, #854d0e); }
    </style>
</head>
<body>

<div class="star-room">
    <div class="header">
        <h2><i class="fas fa-sparkles"></i> 记忆星图：PS 故事拼接</h2>
        <p>个人陈述 (PS) 不是简历的扩写，而是一个动人的<span style="color:#fde047;font-weight:bold;">“英雄之旅”</span>。<br>请将下方的 5 个记忆碎片拖入星轨，连结成一篇逻辑严密的自述故事。</p>
    </div>

    <div class="memory-pool" id="memoryPool">
        <div class="star-fragment" draggable="true" id="frag-goal" data-id="goal">
            <i class="fas fa-flag-checkered frag-icon"></i><div class="frag-title">长远愿景</div><div class="frag-desc">未来我想成为怎样的专家，解决什么行业痛点</div>
        </div>
        <div class="star-fragment" draggable="true" id="frag-match" data-id="match">
            <i class="fas fa-university frag-icon"></i><div class="frag-title">择校契合</div><div class="frag-desc">贵校的 XX 课程/导师，完美契合我当前的知识瓶颈</div>
        </div>
        <div class="star-fragment" draggable="true" id="frag-motive" data-id="motive">
            <i class="fas fa-seedling frag-icon"></i><div class="frag-title">初心启蒙</div><div class="frag-desc">是什么契机让我最初对这个专业领域产生了兴趣</div>
        </div>
        <div class="star-fragment" draggable="true" id="frag-incident" data-id="incident">
            <i class="fas fa-bolt frag-icon"></i><div class="frag-title">关键转折</div><div class="frag-desc">某次实习或实验的挫折，让我意识到需要继续深造</div>
        </div>
        <div class="star-fragment" draggable="true" id="frag-action" data-id="action">
            <i class="fas fa-hammer frag-icon"></i><div class="frag-title">学术历练</div><div class="frag-desc">为了解决问题，我参与了核心项目，掌握了硬核技能</div>
        </div>
    </div>

    <div class="constellation-area" id="constellationBox">
        <svg class="svg-lines" viewBox="0 0 1000 350" preserveAspectRatio="none">
            <path class="constellation-path" d="M 150 87.5 L 325 262.5 L 500 87.5 L 675 262.5 L 850 87.5" />
        </svg>

        <div class="star-slot" id="slot-1" data-pos="1"><div class="slot-num">1</div><div class="slot-hint">故事开篇</div></div>
        <div class="star-slot" id="slot-2" data-pos="2"><div class="slot-num">2</div><div class="slot-hint">承接</div></div>
        <div class="star-slot" id="slot-3" data-pos="3"><div class="slot-num">3</div><div class="slot-hint">转折/高潮</div></div>
        <div class="star-slot" id="slot-4" data-pos="4"><div class="slot-num">4</div><div class="slot-hint">指向目标</div></div>
        <div class="star-slot" id="slot-5" data-pos="5"><div class="slot-num">5</div><div class="slot-hint">升华结局</div></div>
    </div>

    <div class="controls">
        <button class="btn btn-illuminate" onclick="illuminateStars()"><i class="fas fa-magic"></i> 点亮记忆星图</button>
    </div>

    <div class="feedback-panel" id="feedbackBox">
        <div class="fb-title" id="fbTitle"></div>
        <div class="fb-desc" id="fbDesc"></div>
    </div>
</div>

<script>
    const fragments = document.querySelectorAll('.star-fragment');
    const slots = document.querySelectorAll('.star-slot, .memory-pool');

    fragments.forEach(frag => {
        frag.addEventListener('dragstart', (e) => {
            e.dataTransfer.setData('text/plain', e.target.id);
            setTimeout(() => e.target.style.opacity = '0.5', 0);
        });
        frag.addEventListener('dragend', (e) => e.target.style.opacity = '1');
    });

    slots.forEach(slot => {
        slot.addEventListener('dragover', (e) => {
            e.preventDefault();
            if (slot.classList.contains('star-slot')) slot.classList.add('drag-over');
        });
        slot.addEventListener('dragleave', () => slot.classList.remove('drag-over'));
        slot.addEventListener('drop', (e) => {
            e.preventDefault();
            slot.classList.remove('drag-over');
            const fragId = e.dataTransfer.getData('text/plain');
            
            // 挤回旧碎片
            if (slot.classList.contains('star-slot') && slot.querySelectorAll('.star-fragment').length > 0) {
                const existing = slot.querySelector('.star-fragment');
                document.getElementById('memoryPool').appendChild(existing);
            }
            slot.appendChild(document.getElementById(fragId));
        });
    });

    function illuminateStars() {
        const poolCount = document.getElementById('memoryPool').children.length;
        if (poolCount > 0) {
            return showMsg('error', '⚠️ 星图残缺', '请将 5 块记忆碎片全部拼入星轨后再进行点亮。');
        }

        // 获取当前顺序
        let order = [];
        for (let i = 1; i <= 5; i++) {
            order.push(document.getElementById(`slot-${i}`).querySelector('.star-fragment').dataset.id);
        }

        const room = document.querySelector('.star-room');
        room.classList.remove('constellation-lit'); // 重置光效

        // ==== 判卷逻辑 (文书写作的底层框架) ====
        
        // 错误 1: 上来直接夸学校 (模板味极重)
        if (order[0] === 'match') {
            return showMsg('error', '💥 模板警告：生硬的谄媚', '第一段直接写“我非常渴望加入贵校”，这会让教授觉得你毫无个性，像群发的模板邮件。PS 必须由【你自己的故事】开篇！');
        }

        // 错误 2: 目标在因果之前 (逻辑倒置)
        if (order.indexOf('goal') < order.indexOf('action') || order.indexOf('match') < order.indexOf('action')) {
            return showMsg('error', '💥 逻辑坍塌：缺乏根基', '你还没讲述自己受过哪些【学术历练】，就开始谈长远愿景和择校契合度了？这会让你的目标显得极其空泛、假大空。');
        }

        // 错误 3: 动机和转折脱节
        if (order.indexOf('motive') > order.indexOf('action')) {
            return showMsg('error', '🤔 故事倒叙？小心翻车', '你把【学术历练】放在了【初心启蒙】前面。虽然倒叙也可以，但在学术申请文书中，最好先交代你的动机，再展示你的行动，这样读起来更自然。');
        }

        // 判卷通过：王道叙事法
        if (order[0] === 'motive' && order[1] === 'incident' && order[2] === 'action' && order[3] === 'match' && order[4] === 'goal') {
            room.classList.add('constellation-lit');
            return showMsg('success', '✨ 史诗级星图：王道英雄之旅！', '完美的逻辑闭环！<br><b>初心启蒙 -> 遇到瓶颈(关键转折) -> 努力历练 -> 发现不足需贵校指点(择校契合) -> 成就伟业(长远愿景)。</b><br>按照这个骨架去填血肉，你的 PS 绝对是一篇逻辑清晰、感情真挚的神作！(+50金币)');
        }

        // 判卷通过：进阶叙事法 (先讲痛点再回顾)
        if (order[0] === 'incident' && order[1] === 'action' && order[2] === 'motive' && order[3] === 'match' && order[4] === 'goal') {
            room.classList.add('constellation-lit');
            return showMsg('success', '✨ 惊艳的星图：悬念式开局！', '非常高级的叙事手法！<br>开篇直接用一个<b>硬核的挑战/转折</b>抓住眼球，展示你的行动力，然后再娓娓道来你的初心，最后自然引出择校原因和未来愿景。这篇文书非常吸引人！(+50金币)');
        }

        // 兜底提示
        showMsg('error', '🤔 星光闪烁不定', '顺序还能更顺畅一些。记住基本规律：<b>你的过去（动机/历练）决定了你的现在（择校申请），进而指向你的未来（愿景）。</b>');
    }

    function showMsg(type, title, text) {
        const fb = document.getElementById('feedbackBox');
        const fbTitle = document.getElementById('fbTitle');
        fb.className = `feedback-panel status-${type}`;
        fbTitle.innerHTML = type === 'error' ? `<i class="fas fa-times-circle"></i> ${title}` : `<i class="fas fa-star"></i> ${title}`;
        document.getElementById('fbDesc').innerHTML = text;
        fb.style.display = 'block';
    }
</script>
</body>
</html>
