<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Y3-6 暗夜古堡 · 洛克王国对战版</title>
  <style>
    /* ================= 古堡基础 UI (保留原版) ================= */
    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
    :root {
      --fire1: #fff0bf; --fire2: #efc268; --fire3: #d88435;
    }
    body {
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif; overflow: hidden; color: #fff; height: 100vh;
      background: radial-gradient(circle at 78% 15%, rgba(220,230,255,.12), transparent 18%),
                  radial-gradient(circle at 16% 18%, rgba(255,255,255,.04), transparent 12%),
                  linear-gradient(to bottom, #03050b 0%, #07101d 26%, #0c1730 58%, #132443 100%);
    }

    .sky, .dusts { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
    .star { position: absolute; border-radius: 50%; background: #fff; box-shadow: 0 0 10px rgba(255,255,255,.65); animation: twinkle 3.2s infinite ease-in-out; }
    .dust { position: absolute; width: 10px; height: 10px; border-radius: 50%; background: radial-gradient(circle, rgba(255,255,255,.8), rgba(180,195,255,.35), transparent 75%); animation: drift 12s linear infinite; opacity: .55; }
    @keyframes twinkle { 0%,100% { opacity: .22; transform: scale(1); } 50% { opacity: .9; transform: scale(1.5); } }
    @keyframes drift { 0% { transform: translate(0,0) scale(.8); opacity: 0; } 15% { opacity: .55; } 100% { transform: translate(70px,-180px) scale(1.25); opacity: 0; } }

    .moon {
      position: fixed; right: 7%; top: 6%; width: 175px; height: 175px; border-radius: 50%; z-index: 2;
      background: radial-gradient(circle, #f8fbff 0%, #dfe8ff 55%, #c6d0e8 82%, rgba(255,255,255,.04) 100%);
      box-shadow: 0 0 36px rgba(218,228,255,.55), 0 0 120px rgba(170,190,240,.24);
    }
    .moon::after { content: ""; position: absolute; right: 18px; top: 20px; width: 42px; height: 42px; border-radius: 50%; background: rgba(180,192,220,.14); }

    .topbar {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%); width: min(1280px, 95vw);
      display: flex; gap: 14px; justify-content: space-between; align-items: center; flex-wrap: wrap; z-index: 40;
    }
    .panel {
      backdrop-filter: blur(14px); background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.04));
      border: 1px solid rgba(255,255,255,.13); border-radius: 20px; box-shadow: 0 0 24px rgba(0,0,0,.25), inset 0 0 18px rgba(255,255,255,.02); padding: 16px 22px;
    }
    .title-box { min-width: 520px; }
    .title { font-size: 30px; font-weight: 900; background: linear-gradient(90deg, #fff, #f0deb0, #dfe8ff, #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 1px; }
    .subtitle { margin-top: 8px; color: #e8edff; line-height: 1.65; font-size: 14px; opacity: .96; }
    .status { display: flex; gap: 12px; flex-wrap: wrap; }
    .stat { min-width: 118px; text-align: center; padding: 12px 14px; border-radius: 16px; background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.10); }
    .stat-label { font-size: 12px; color: #dbe5ff; }
    .stat-value { margin-top: 6px; font-size: 22px; font-weight: 900; color: #ecd9a7; }

    .scene { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
    .ground { position: absolute; left: 0; bottom: 0; width: 100%; height: 19vh; background: linear-gradient(to top, #0f1a12, #17251b 40%, transparent); z-index: 3; }
    .mist { position: absolute; left: 0; bottom: 8vh; width: 100%; height: 12vh; background: linear-gradient(to right, rgba(255,255,255,.03), rgba(220,228,255,.11), rgba(255,255,255,.03)); filter: blur(18px); z-index: 4; }
    .road { position: absolute; left: 50%; bottom: 0; transform: translateX(-50%); width: 30vw; min-width: 320px; height: 18vh; background: linear-gradient(to top, rgba(122,129,141,.46), rgba(255,255,255,.10), transparent); clip-path: polygon(40% 100%, 60% 100%, 74% 0, 26% 0); z-index: 4; }

    /* 城堡绘制 */
    .castle-wrap { position: absolute; left: 50%; bottom: 8vh; transform: translateX(-50%); width: min(1200px, 94vw); height: 70vh; z-index: 10; }
    .castle-glow { position: absolute; left: 50%; bottom: 8%; transform: translateX(-50%); width: 78%; height: 56%; border-radius: 50%; background: radial-gradient(circle, rgba(170,185,230,.12), rgba(240,200,120,.05), transparent 72%); filter: blur(30px); z-index: 0; }
    .wall { position: absolute; border: 4px solid rgba(195,204,222,.95); box-shadow: inset 0 0 18px rgba(255,255,255,.05), 0 0 20px rgba(0,0,0,.18); background: linear-gradient(to bottom, #959daa 0%, #737c89 18%, #535d69 52%, #36404b 78%, #232a33 100%); }
    .back-wall-left, .back-wall-right { bottom: 0; width: 17%; height: 48%; z-index: 5; border-radius: 4px; }
    .back-wall-left { left: 18%; } .back-wall-right { right: 18%; }
    .front-wall { position: absolute; left: 50%; bottom: 0; transform: translateX(-50%); width: 52%; height: 30%; z-index: 8; border-radius: 4px; }
    .center-keep { position: absolute; left: 50%; bottom: 24%; transform: translateX(-50%); width: 16%; height: 62%; z-index: 7; border-radius: 4px; }
    .side-tower { position: absolute; bottom: 0; width: 18%; height: 74%; z-index: 4; border-radius: 4px; }
    .side-tower.left { left: 4%; } .side-tower.right { right: 4%; }
    .side-tower::before, .back-wall-left::before, .back-wall-right::before, .front-wall::before, .center-keep::before {
      content: ""; position: absolute; left: -4px; top: -22px; width: calc(100% + 8px); height: 22px;
      background: linear-gradient(135deg, transparent 10px, rgba(170,179,194,.96) 0) top left, linear-gradient(225deg, transparent 10px, rgba(170,179,194,.96) 0) top right, linear-gradient(315deg, transparent 10px, rgba(170,179,194,.96) 0) bottom right, linear-gradient(45deg, transparent 10px, rgba(170,179,194,.96) 0) bottom left;
      background-size: 50% 50%; background-repeat: no-repeat;
    }
    .spire { position: absolute; width: 0; height: 0; border-left: 44px solid transparent; border-right: 44px solid transparent; border-bottom: 120px solid #262b38; z-index: 9; filter: drop-shadow(0 0 10px rgba(0,0,0,.35)); }
    .spire.small { border-left-width: 34px; border-right-width: 34px; border-bottom-width: 96px; }
    .spire.left { left: 7.8%; bottom: 77%; } .spire.right { right: 7.8%; bottom: 77%; } .spire.mid-left { left: 25.6%; bottom: 51%; } .spire.mid-right { right: 25.6%; bottom: 51%; } .spire.center { left: 50%; bottom: 88%; transform: translateX(-50%); }
    .cap { position: absolute; width: 12px; height: 28px; border-radius: 6px 6px 0 0; background: linear-gradient(to bottom, #efddaa, #c79d52); z-index: 10; box-shadow: 0 0 12px rgba(239,221,170,.24); }
    .cap.left { left: 11.1%; bottom: 95.3%; } .cap.right { right: 11.1%; bottom: 95.3%; } .cap.mid-left { left: 28.1%; bottom: 63%; } .cap.mid-right { right: 28.1%; bottom: 63%; } .cap.center { left: 50%; bottom: 108%; transform: translateX(-50%); }
    .flagpole { position: absolute; width: 3px; height: 86px; background: rgba(230,235,245,.95); z-index: 10; }
    .flagpole::after { content: ""; position: absolute; left: 3px; top: 10px; width: 34px; height: 16px; background: linear-gradient(90deg, #6c1c29, #972b39); clip-path: polygon(0 0, 100% 18%, 82% 50%, 100% 82%, 0 100%); animation: wave 2.2s infinite ease-in-out; }
    .flagpole.left { left: 11.2%; bottom: 79%; } .flagpole.right { right: 11.2%; bottom: 79%; } .flagpole.center { left: 50%; bottom: 90%; transform: translateX(-50%); }
    @keyframes wave { 0%,100% { transform: skewY(0deg); } 50% { transform: skewY(7deg); } }
    .window { position: absolute; width: 24px; height: 74px; border-radius: 14px 14px 4px 4px; background: linear-gradient(to bottom, var(--fire1), var(--fire2) 42%, var(--fire3) 100%); border: 2px solid rgba(235,220,175,.9); box-shadow: 0 0 18px rgba(240,194,104,.34); z-index: 9; }
    .round-window { position: absolute; width: 54px; height: 54px; border-radius: 50%; background: radial-gradient(circle, #fff, #f1ddb0, #d08d44); border: 2px solid rgba(235,220,175,.9); box-shadow: 0 0 14px rgba(240,194,104,.28); z-index: 9; }

    .door-row { position: absolute; left: 50%; bottom: 0.5%; transform: translateX(-50%); width: 62%; display: flex; justify-content: center; gap: 24px; align-items: end; z-index: 12; pointer-events: none; }
    .door { position: relative; pointer-events: auto; cursor: pointer; display: flex; align-items: end; justify-content: center; text-align: center; padding: 10px; color: #f5f1e6; font-size: 14px; font-weight: 800; border: 4px solid rgba(215,191,133,.92); box-shadow: 0 0 20px rgba(0,0,0,.25), inset 0 0 14px rgba(255,255,255,.04); transition: transform .22s ease, filter .22s ease, box-shadow .22s ease; overflow: hidden; background: linear-gradient(to bottom, rgba(255,255,255,.08), rgba(255,255,255,.02)), linear-gradient(to bottom, #5d4832, #382b1d 46%, #181109 100%); }
    .door::before { content: ""; position: absolute; inset: 4px; border-radius: inherit; background: linear-gradient(to bottom, rgba(255,255,255,.10), rgba(255,255,255,.02)), repeating-linear-gradient(90deg, rgba(255,255,255,.03) 0 2px, transparent 2px 18px); pointer-events: none; }
    .door::after { content: ""; position: absolute; right: 12px; top: 50%; transform: translateY(-50%); width: 12px; height: 12px; border-radius: 50%; background: radial-gradient(circle, #fff5d4, #d5a64d); box-shadow: 0 0 10px rgba(213,166,77,.6); }
    .door:hover { transform: translateY(-6px) scale(1.03); filter: brightness(1.05); box-shadow: 0 0 28px rgba(0,0,0,.3), 0 0 16px rgba(235,220,175,.10), inset 0 0 14px rgba(255,255,255,.05); }
    .door-label { width: 100%; padding: 4px 6px; line-height: 1.2; border-radius: 10px; background: rgba(8, 12, 22, .42); border: 1px solid rgba(255,255,255,.08); position: relative; z-index: 2; font-size: 11px; text-align: center; }
    .status-tag { position: absolute; top: 7px; right: 7px; font-size: 11px; padding: 3px 8px; border-radius: 999px; background: rgba(0,0,0,.3); border: 1px solid rgba(255,255,255,.12); z-index: 2; }
    .door.locked { filter: grayscale(.2) brightness(.82); pointer-events: none; }
    .door.cleared .status-tag { background: rgba(50,120,76,.42); color: #e2ffe9; }
    
    .trial-door { width: 15%; height: 110px; border-radius: 28px 28px 10px 10px; }
    .final-door { position: absolute; left: 50%; bottom: 32%; transform: translateX(-50%); width: 14%; height: 128px; border-radius: 24px 24px 10px 10px; z-index: 11; background: linear-gradient(to bottom, rgba(255,255,255,.10), rgba(255,255,255,.03)), linear-gradient(to bottom, #6b573b, #45331f 44%, #1c140c 100%); box-shadow: 0 0 20px rgba(0,0,0,.28), 0 0 18px rgba(235,220,175,.10), inset 0 0 14px rgba(255,255,255,.05); }
    .final-door:hover { transform: translateX(-50%) translateY(-6px) scale(1.03); }

    .hint { position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%); z-index: 25; background: rgba(8, 12, 24, .76); border: 1px solid rgba(255,255,255,.10); padding: 12px 20px; border-radius: 999px; color: #e8edff; text-align: center; backdrop-filter: blur(10px); box-shadow: 0 0 14px rgba(0,0,0,.18); }

    /* ================= 古堡弹窗基础 UI ================= */
    .modal { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(5, 7, 14, .84); z-index: 60; padding: 18px; }
    .modal.show { display: flex; }
    .modal-card { position: relative; width: min(1120px, 96vw); max-height: 92vh; overflow: auto; border-radius: 22px; padding: 24px; background: linear-gradient(180deg, rgba(17,22,38,.98), rgba(10,14,24,.98)), radial-gradient(circle at top right, rgba(255,255,255,.06), transparent 30%); border: 1px solid rgba(255,255,255,.12); box-shadow: 0 0 38px rgba(0,0,0,.3); }
    .close-btn { position: absolute; top: 12px; right: 12px; width: 42px; height: 42px; border-radius: 50%; border: none; background: rgba(255,255,255,.08); color: #fff; font-size: 22px; cursor: pointer; z-index: 100; }
    .close-btn:hover { background: #e74c3c; }
    
    .level-header { display: flex; justify-content: space-between; align-items: center; gap: 14px; flex-wrap: wrap; margin-bottom: 18px; }
    .level-title { font-size: 28px; font-weight: 900; color: #ead7a7; }
    .level-desc { margin-top: 8px; color: #e4eaff; line-height: 1.7; font-size: 15px; max-width: 760px; }
    .battle-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 18px; margin-top: 18px; }
    .box { background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.10); border-radius: 18px; padding: 18px; }
    .character-name { font-size: 20px; font-weight: 900; margin-bottom: 10px; }
    .info-list { margin-top: 14px; display: grid; gap: 10px; }
    .info-item { padding: 12px 14px; border-radius: 14px; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.07); color: #edf1ff; line-height: 1.7; }
    .reward-box { margin-top: 16px; padding: 16px; border-radius: 18px; background: linear-gradient(135deg, rgba(232,210,155,.10), rgba(255,255,255,.04)); border: 1px solid rgba(232,210,155,.22); color: #f1e3be; }
    .center-actions { display: flex; justify-content: center; gap: 15px; margin-top: 16px; }
    .btn.next { background: linear-gradient(135deg, #e8d29b, #ba944e); color: #2c2110; font-weight: bold; font-size: 1.1rem; padding: 12px 30px; border: none; border-radius: 14px; cursor: pointer; transition: 0.2s;}
    .btn.next:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

    /* ================= 洛克王国战斗场景 UI ================= */
    .roco-game-screen {
      width: 100%; max-width: 1000px; height: 600px; background: #000;
      border: 4px solid rgba(255,255,255,0.1); border-radius: 15px; position: relative;
      box-shadow: 0 0 30px rgba(0,0,0,0.6); overflow: hidden;
      display: flex; flex-direction: column; margin: 0 auto;
    }
    
    .roco-battle-scene {
      flex: 1; position: relative;
      background: linear-gradient(to bottom, #1a2a6c, #112 60%, #2c3e50);
      overflow: hidden;
    }
    
    .ground-ellipse {
      position: absolute; border-radius: 50%; background: rgba(0,0,0,0.4);
      box-shadow: 0 0 20px rgba(0,0,0,0.6);
    }
    .ground-hero { bottom: 20px; left: 15%; width: 250px; height: 60px; }
    .ground-enemy { top: 120px; right: 15%; width: 250px; height: 60px; }

    .sprite {
      position: absolute; font-size: 110px; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
      transition: transform 0.3s;
    }
    .sprite-hero { bottom: 40px; left: 20%; z-index: 10; }
    .sprite-enemy { top: 70px; right: 20%; z-index: 5; }

    /* 动画库 */
    .anim-hero-attack { animation: heroRush 0.6s ease-in-out; }
    @keyframes heroRush {
      0% { transform: translate(0, 0); }
      40% { transform: translate(400px, -100px) scale(1.2); filter: drop-shadow(0 0 20px #e74c3c); }
      60% { transform: translate(400px, -100px) scale(1.2); filter: drop-shadow(0 0 20px #e74c3c); }
      100% { transform: translate(0, 0); }
    }
    .anim-enemy-attack { animation: enemyRush 0.6s ease-in-out; }
    @keyframes enemyRush {
      0% { transform: translate(0, 0) scaleX(-1); }
      40% { transform: translate(-400px, 100px) scale(1.2) scaleX(-1); filter: drop-shadow(0 0 20px #e74c3c); }
      60% { transform: translate(-400px, 100px) scale(1.2) scaleX(-1); filter: drop-shadow(0 0 20px #e74c3c); }
      100% { transform: translate(0, 0) scaleX(-1); }
    }
    .anim-hit { animation: takeDamage 0.5s; }
    @keyframes takeDamage {
      0%, 100% { filter: brightness(1) drop-shadow(0 10px 10px rgba(0,0,0,0.5)); transform: translateX(0); }
      20%, 60% { filter: brightness(2) drop-shadow(0 0 20px rgba(231,76,60,1)); transform: translateX(-15px); }
      40%, 80% { filter: brightness(2) drop-shadow(0 0 20px rgba(231,76,60,1)); transform: translateX(15px); }
    }

    .damage-text {
      position: absolute; font-size: 40px; font-weight: 900; color: #ff3333;
      text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff;
      z-index: 20; opacity: 0; pointer-events: none;
    }
    .damage-anim { animation: floatUp 1s ease-out forwards; }
    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(0.5); }
      20% { transform: translateY(-30px) scale(1.2); }
      100% { opacity: 0; transform: translateY(-80px) scale(1); }
    }

    /* HUD 信息面板 */
    .hud {
      position: absolute; background: rgba(255,255,255,0.95); color: #2d3748;
      border: 4px solid #cbd5e0; border-radius: 12px; padding: 12px 18px; width: 300px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 15;
    }
    .hud-enemy { top: 25px; left: 25px; }
    .hud-hero { bottom: 35px; right: 25px; }
    .hud-name { font-weight: 900; font-size: 1.2rem; margin-bottom: 8px; display: flex; justify-content: space-between;}
    .hud-name span.lvl { font-weight: bold; font-size: 1rem; color: #d69e2e; }
    .hp-bar-bg { width: 100%; height: 14px; background: #a0aec0; border-radius: 7px; overflow: hidden; border: 1px solid #718096;}
    .hp-bar-fill { height: 100%; background: #48bb78; transition: width 0.5s ease-out, background-color 0.3s; }
    .hp-text { text-align: right; font-size: 0.9rem; font-weight: bold; margin-top: 4px; }
    .shield-tag { color: #3182ce; font-size: 0.85rem; font-weight: bold; margin-top: 4px; display: none; }

    /* 底部操作区 */
    .ui-bottom {
      height: 180px; background: linear-gradient(to bottom, #2d3748, #1a202c);
      border-top: 4px solid #f6e05e; display: flex;
    }
    .message-box {
      flex: 1; padding: 25px; font-size: 1.4rem; line-height: 1.6; font-weight: bold;
      color: #fff; border-right: 4px solid #4a5568; display: flex; align-items: center; text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }
    .action-menu {
      width: 500px; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
      padding: 12px; gap: 12px; display: none;
    }
    .skill-btn {
      background: linear-gradient(to bottom, #fffaf0, #e2e8f0); border: 3px solid #a0aec0;
      border-radius: 10px; cursor: pointer; display: flex; flex-direction: column; 
      justify-content: center; align-items: center; transition: 0.15s;
    }
    .skill-btn:hover { background: #fefcbf; border-color: #d69e2e; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    .skill-btn:active { transform: scale(0.95); }
    .skill-btn:disabled { filter: grayscale(1); opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none;}
    .skill-name { font-weight: 900; font-size: 1.2rem; color: #2d3748; }
    .skill-pp { font-size: 0.9rem; color: #718096; font-weight: bold; margin-top: 5px; }
    .skill-type { font-size: 0.8rem; padding: 2px 8px; border-radius: 4px; color: #fff; margin-top: 4px; font-weight: bold;}
    .type-normal { background: #a0aec0; } .type-fire { background: #e53e3e; } .type-magic { background: #805ad5; } .type-heal { background: #38b2ac; }

    /* 最终结算面板 */
    .final-reward-screen { text-align: center; padding: 18px 8px 8px; }
    .big-gem { font-size: 124px; filter: drop-shadow(0 0 24px rgba(232,210,155,.5)); margin: 16px 0; }
  </style>
</head>
<body>
  <div class="sky" id="sky"></div>
  <div class="dusts" id="dusts"></div>
  <div class="moon"></div>

  <div class="topbar">
    <div class="panel title-box">
      <div class="title">🏰 西浦升学 · 冲刺修罗场 🏰</div>
      <div class="subtitle">申请季的每月都是一场死斗！打通三扇门，开启最后的 Offer 圣殿。</div>
    </div>
    <div class="panel status">
      <div class="stat"><div class="stat-label">已通关</div><div class="stat-value" id="clearCount">0 / 3</div></div>
      <div class="stat"><div class="stat-label">徽印</div><div class="stat-value" id="gemCount">0</div></div>
      <div class="stat"><div class="stat-label">等级</div><div class="stat-value" id="playerLevel">1</div></div>
      <div class="stat"><div class="stat-label">冰美式(血瓶)</div><div class="stat-value" id="potionCount">4</div></div>
    </div>
  </div>

  <div class="scene">
    <div class="road"></div>
    <div class="castle-wrap">
      <div class="castle-glow"></div>
      <div class="wall side-tower left"></div><div class="wall side-tower right"></div>
      <div class="wall back-wall-left"></div><div class="wall back-wall-right"></div>
      <div class="wall center-keep"></div><div class="wall front-wall"></div>
      <div class="spire left"></div><div class="spire right"></div>
      <div class="spire mid-left small"></div><div class="spire mid-right small"></div><div class="spire center"></div>
      <div class="cap left"></div><div class="cap right"></div><div class="cap mid-left"></div><div class="cap mid-right"></div><div class="cap center"></div>
      <div class="flagpole left"></div><div class="flagpole right"></div><div class="flagpole center"></div>
      <div class="round-window" style="left:11%; bottom:55%;"></div><div class="window" style="left:11.5%; bottom:18%;"></div>
      <div class="round-window" style="left:48.7%; bottom:61%;"></div>
      <div class="round-window" style="right:11%; bottom:56%;"></div><div class="window" style="right:11.5%; bottom:18%;"></div>

      <div class="door final-door locked" id="finalDoor">
        <div class="status-tag">最终门</div>
        <div class="door-label">Offer 圣殿</div>
      </div>

      <div class="door-row">
        <div class="door trial-door" data-level="0"><div class="status-tag">9月</div><div class="door-label">语言之门</div></div>
        <div class="door trial-door locked" data-level="1"><div class="status-tag">未解锁</div><div class="door-label">文书之门</div></div>
        <div class="door trial-door locked" data-level="2"><div class="status-tag">未解锁</div><div class="door-label">网申之门</div></div>
      </div>
    </div>
    <div class="mist"></div><div class="ground"></div>
  </div>

  <div class="hint">点击下方的三扇门开始试炼。利用技能 PP 管理与动画战斗，活到最后！</div>

  <div class="modal" id="gameModal">
    <div class="modal-card" id="modalCard">
      <button class="close-btn" id="closeModal">×</button>
      <div id="gameContent"></div>
    </div>
  </div>

  <script>
    // ======= 全局状态 =======
    const gameState = {
      gems: 0, cleared: [false, false, false], level: 1, potions: 4, shield: false,
      currentStage: null, inBattle: false, isAnimating: false,
      hero: { name: "申请者(你)", icon: "👨‍🎓", hp: 120, maxHp: 120 },
      enemy: null
    };

    const stages = [
      { id: 0, title: "九月前哨：语言之战", subtitle: "没有语言成绩，后面寸步难行。", gemReward: 1, enemy: { name: "雅思恶龙", icon: "🐲", hp: 150, atk: 20 } },
      { id: 1, title: "十月炼狱：文书之战", subtitle: "写不出文书的痛苦，像僵尸一样啃食着你。", gemReward: 1, enemy: { name: "难产僵尸", icon: "🧟", hp: 200, atk: 30 } },
      { id: 2, title: "十一月深渊：网申之战", subtitle: "DDL逼近！填表、传材料，不能有一丝失误。", gemReward: 1, enemy: { name: "DDL死神", icon: "💀", hp: 280, atk: 45 } }
    ];

    // 整合洛克王国式的技能数据
    const heroSkills = [
      { id: 0, name: "真题突刺", pp: 15, maxPp: 15, power: 30, type: "attack", cssType: "type-normal", cssLabel: "物理", text: "使用了 真题突刺！" },
      { id: 1, name: "外教精修斩", pp: 3, maxPp: 3, power: 80, type: "heavy", cssType: "type-fire", cssLabel: "魔法 · 暴击", text: "祭出底牌 外教精修斩！效果拔群！" },
      { id: 2, name: "套磁护盾", pp: 5, maxPp: 5, power: 0, type: "shield", cssType: "type-magic", cssLabel: "变化 · 防御", text: "厚脸皮发了套磁信！防御力大幅提升了！" },
      { id: 3, name: "浓缩冰美式", pp: gameState.potions, maxPp: gameState.potions, power: -80, type: "heal", cssType: "type-heal", cssLabel: "恢复", text: "猛灌了一口冰美式！精力恢复了！" }
    ];

    // ======= 视觉初始化 =======
    function createSky() {
      const sky = document.getElementById("sky"), dusts = document.getElementById("dusts");
      for(let i=0; i<50; i++) { let s = document.createElement("div"); s.className = "star"; let size = Math.random()*3+1; s.style.width=size+"px"; s.style.height=size+"px"; s.style.left=Math.random()*100+"vw"; s.style.top=Math.random()*78+"vh"; s.style.animationDelay=Math.random()*4+"s"; sky.appendChild(s); }
      for(let i=0; i<10; i++) { let d = document.createElement("div"); d.className = "dust"; d.style.left=Math.random()*100+"vw"; d.style.top=(48+Math.random()*24)+"vh"; d.style.animationDuration=(8+Math.random()*6)+"s"; d.style.animationDelay=Math.random()*8+"s"; dusts.appendChild(d); }
    }
    createSky();

    function updateHUD() {
      document.getElementById("clearCount").textContent = `${gameState.cleared.filter(Boolean).length} / 3`;
      document.getElementById("gemCount").textContent = gameState.gems;
      document.getElementById("playerLevel").textContent = gameState.level;
      document.getElementById("potionCount").textContent = gameState.potions;
      
      // 更新冰美式数量
      heroSkills[3].pp = gameState.potions; heroSkills[3].maxPp = gameState.potions;

      document.querySelectorAll(".door[data-level]").forEach(door => {
        const idx = Number(door.dataset.level); door.classList.remove("locked", "cleared"); const tag = door.querySelector(".status-tag");
        if(gameState.cleared[idx]) { door.classList.add("cleared"); tag.textContent = "已击杀"; }
        else if(idx>0 && !gameState.cleared[idx-1]) { door.classList.add("locked"); tag.textContent = "未解锁"; }
        else tag.textContent = idx===0 ? "9月" : idx===1 ? "10月" : "11月";
      });

      const allClear = gameState.cleared.every(Boolean);
      const fd = document.getElementById("finalDoor"); fd.classList.toggle("locked", !allClear); fd.classList.toggle("cleared", allClear);
      fd.querySelector(".status-tag").textContent = allClear ? "已开启" : "最终门";
    }

    // ======= 弹窗与引导 =======
    const modal = document.getElementById("gameModal"), content = document.getElementById("gameContent");
    document.getElementById("closeModal").addEventListener("click", () => {
      if(gameState.inBattle && !confirm("战斗正在进行中，确定要逃跑吗？")) return;
      modal.classList.remove("show");
      gameState.inBattle = false;
    });

    // 战前准备界面（保留原版）
    function openStage(idx) {
      if(idx>0 && !gameState.cleared[idx-1]) return;
      const stg = stages[idx]; gameState.currentStage = stg;
      
      content.innerHTML = `
        <div class="level-header"><div><div class="level-title">${stg.title}</div><div class="level-desc">${stg.subtitle}</div></div></div>
        <div class="battle-grid">
          <div class="box" style="text-align:center;">
            <div class="character-name">镇守魔王：${stg.enemy.name}</div>
            <div style="font-size:80px; margin:20px 0; filter:drop-shadow(0 0 15px #e74c3c);">${stg.enemy.icon}</div>
            <div style="color:#ead7a7; font-weight:bold;">HP: ${stg.enemy.hp} | 基础攻击: ${stg.enemy.atk}</div>
          </div>
          <div class="box">
            <div class="character-name">战斗情报</div>
            <div class="info-list">
              <div class="info-item">⚔️ 注意管理【外教精修斩】的 PP，它伤害极高但次数有限。</div>
              <div class="info-item">🛡️ 危机时使用【套磁护盾】可以抵挡敌方 70% 的伤害。</div>
            </div>
            ${gameState.cleared[idx] ? '<div class="reward-box" style="border-color:#2ecc71;">此怪已被击败，再次挑战无额外奖励。</div>' : `<div class="reward-box">首通奖励：<b>${stg.gemReward}个徽印</b> + 升级 + 补充冰美式。</div>`}
          </div>
        </div>
        <div class="center-actions"><button class="btn next" onclick="initBattle()">拔剑迎战</button></div>
      `;
      modal.classList.add("show");
    }

    // ======= 缝合核心：洛克王国战斗场景 =======
    function initBattle() {
      // 属性初始化 (等级加成)
      const lvlBonus = (gameState.level - 1) * 30;
      gameState.hero.maxHp = 120 + lvlBonus; gameState.hero.hp = gameState.hero.maxHp; gameState.hero.shield = false;
      heroSkills.forEach(s => { if(s.id !== 3) s.pp = s.maxPp; }); 
      
      const stg = gameState.currentStage;
      gameState.enemy = { ...stg.enemy, maxHp: stg.enemy.hp };
      gameState.inBattle = true; gameState.isAnimating = true;

      renderRocoBattleUI();
      
      // 开场动画与播报
      setTimeout(() => {
        typeWriter(`野生的 ${gameState.enemy.name} 出现了！`, () => {
            setTimeout(() => {
                document.getElementById('msgBox').innerText = "该你出招了，请选择战术：";
                document.getElementById('actionMenu').style.display = 'grid';
                gameState.isAnimating = false;
            }, 800);
        });
      }, 500);
    }

    function renderRocoBattleUI() {
      const h = gameState.hero, e = gameState.enemy;
      
      // 生成技能按钮
      let skillsHtml = heroSkills.map(s => `
        <button class="skill-btn" id="btn-${s.id}" onclick="useSkill(${s.id})" ${s.pp <= 0 ? 'disabled' : ''}>
            <div class="skill-name">${s.name}</div>
            <div class="skill-type ${s.cssType}">${s.cssLabel}</div>
            <div class="skill-pp" id="pp-${s.id}">PP: ${s.pp}/${s.maxPp}</div>
        </button>
      `).join('');

      content.innerHTML = `
        <div class="roco-game-screen">
            <div class="roco-battle-scene">
                <div class="ground-ellipse ground-enemy"></div>
                <div class="ground-ellipse ground-hero"></div>

                <div class="hud hud-enemy">
                    <div class="hud-name"><span>${e.name}</span> <span class="lvl">Lv.${gameState.currentStage.id * 10 + 20}</span></div>
                    <div class="hp-bar-bg"><div class="hp-bar-fill" id="eHpBar" style="background:#e53e3e;"></div></div>
                    <div class="hp-text"><span id="eHpText">${e.hp}/${e.maxHp}</span></div>
                </div>
                <div class="sprite sprite-enemy" id="enemySprite" style="transform: scaleX(-1);">${e.icon}</div>
                <div class="damage-text" id="enemyDmg" style="top: 100px; right: 28%;"></div>

                <div class="hud hud-hero">
                    <div class="hud-name"><span>${h.name}</span> <span class="lvl">Lv.${gameState.level * 10 + 10}</span></div>
                    <div class="hp-bar-bg"><div class="hp-bar-fill" id="hHpBar"></div></div>
                    <div class="hp-text"><span id="hHpText">${h.hp}/${h.maxHp}</span></div>
                    <div class="shield-tag" id="hShieldTag">🛡️ 套磁护盾激活中</div>
                </div>
                <div class="sprite sprite-hero" id="heroSprite">${h.icon}</div>
                <div class="damage-text" id="heroDmg" style="bottom: 120px; left: 28%;"></div>
            </div>

            <div class="ui-bottom">
                <div class="message-box" id="msgBox">准备战斗...</div>
                <div class="action-menu" id="actionMenu">${skillsHtml}</div>
            </div>
        </div>
      `;
      updateBars();
    }

    // 打字机特效
    function typeWriter(text, callback, clear=true) {
        const box = document.getElementById('msgBox');
        if (!box) return;
        if(clear) box.innerHTML = ''; else box.innerHTML += '<br>';
        
        let i = 0; let speed = 30;
        function type() {
            if (i < text.length) {
                box.innerHTML += text.charAt(i); i++;
                setTimeout(type, speed);
            } else if (callback) {
                setTimeout(callback, 500);
            }
        }
        type();
    }

    // 玩家回合出招
    function useSkill(skillIdx) {
        if (!gameState.inBattle || gameState.isAnimating) return;
        const skill = heroSkills[skillIdx];
        if (skill.pp <= 0) return;
        
        gameState.isAnimating = true;
        document.getElementById('actionMenu').style.display = 'none';
        
        // 扣减PP
        skill.pp--;
        if(skillIdx === 3) gameState.potions--; // 同步全局血瓶
        document.getElementById(`pp-${skillIdx}`).innerText = `PP: ${skill.pp}/${skill.maxPp}`;
        if (skill.pp === 0) document.getElementById(`btn-${skillIdx}`).disabled = true;

        typeWriter(`你 ${skill.text}`, () => {
            if (skill.type === 'attack' || skill.type === 'heavy') {
                playAttackAnim('hero', () => {
                    // 等级加成伤害
                    let dmg = skill.power + Math.floor(Math.random() * 15) + (gameState.level - 1) * 10;
                    applyDamage('enemy', dmg);
                    setTimeout(() => checkWinOrNext(), 1000);
                });
            } else if (skill.type === 'heal') {
                let heal = Math.abs(skill.power) + (gameState.level * 15);
                gameState.hero.hp = Math.min(gameState.hero.maxHp, gameState.hero.hp + heal);
                updateBars();
                showFloatingText('hero', `+${heal}`, '#48bb78');
                setTimeout(() => checkWinOrNext(), 1000);
            } else if (skill.type === 'shield') {
                gameState.hero.shield = true;
                updateBars();
                setTimeout(() => checkWinOrNext(), 1000);
            }
        });
    }

    // 状态机检查
    function checkWinOrNext() {
        if (gameState.enemy.hp <= 0) {
            typeWriter(`成功击溃了 ${gameState.enemy.name}！`, () => { setTimeout(() => winStage(), 1200); });
        } else {
            enemyTurn();
        }
    }

    // 敌人回合
    function enemyTurn() {
        let eName = gameState.enemy.name;
        typeWriter(`${eName} 发起了疯狂的反扑！`, () => {
            playAttackAnim('enemy', () => {
                let dmg = gameState.enemy.atk + Math.floor(Math.random() * 20);
                if (gameState.hero.shield) {
                    dmg = Math.floor(dmg * 0.3); // 护盾减伤
                    gameState.hero.shield = false; 
                    typeWriter(`套磁护盾抵挡了大量伤害！`, null, false);
                }
                
                applyDamage('hero', dmg);
                updateBars();
                
                setTimeout(() => {
                    if (gameState.hero.hp <= 0) {
                        typeWriter(`你被 DDL 和压力彻底击垮了...`, () => { setTimeout(() => loseStage(), 1500); });
                    } else {
                        document.getElementById('msgBox').innerText = "该你出招了，请选择战术：";
                        document.getElementById('actionMenu').style.display = 'grid';
                        gameState.isAnimating = false;
                    }
                }, 1000);
            });
        });
    }

    // 动画引擎调用
    function playAttackAnim(attacker, onHit) {
        const sprite = document.getElementById(attacker === 'hero' ? 'heroSprite' : 'enemySprite');
        sprite.classList.add(attacker === 'hero' ? 'anim-hero-attack' : 'anim-enemy-attack');
        setTimeout(() => { if (onHit) onHit(); }, 300); // 冲刺中间点造成伤害
        setTimeout(() => { sprite.classList.remove('anim-hero-attack', 'anim-enemy-attack'); }, 600);
    }

    function applyDamage(target, damage) {
        const tgtSprite = document.getElementById(target === 'hero' ? 'heroSprite' : 'enemySprite');
        tgtSprite.classList.add('anim-hit');
        setTimeout(() => tgtSprite.classList.remove('anim-hit'), 500);

        if (target === 'enemy') {
            gameState.enemy.hp = Math.max(0, gameState.enemy.hp - damage);
        } else {
            gameState.hero.hp = Math.max(0, gameState.hero.hp - damage);
        }
        updateBars();
        showFloatingText(target, `-${damage}`, '#ff3333');
    }

    function showFloatingText(target, text, color) {
        const dmgEl = document.getElementById(target === 'hero' ? 'heroDmg' : 'enemyDmg');
        if(!dmgEl) return;
        dmgEl.innerText = text; dmgEl.style.color = color;
        dmgEl.classList.remove('damage-anim'); void dmgEl.offsetWidth; dmgEl.classList.add('damage-anim');
    }

    function updateBars() {
        const hPct = (gameState.hero.hp / gameState.hero.maxHp) * 100;
        const ePct = (gameState.enemy.hp / gameState.enemy.maxHp) * 100;
        
        const hBar = document.getElementById('hHpBar');
        if(hBar) {
            hBar.style.width = hPct + '%';
            hBar.style.backgroundColor = hPct > 50 ? '#48bb78' : (hPct > 20 ? '#ecc94b' : '#e53e3e');
            document.getElementById('hHpText').innerText = `${gameState.hero.hp}/${gameState.hero.maxHp}`;
        }

        const eBar = document.getElementById('eHpBar');
        if(eBar) {
            eBar.style.width = ePct + '%';
            document.getElementById('eHpText').innerText = `${gameState.enemy.hp}/${gameState.enemy.maxHp}`;
        }

        const shieldTag = document.getElementById('hShieldTag');
        if(shieldTag) { shieldTag.style.display = gameState.hero.shield ? 'block' : 'none'; }
    }

    // ======= 战斗结算 =======
    function winStage() {
      gameState.inBattle = false; gameState.isAnimating = false;
      const stg = gameState.currentStage;
      let rText = "你已经碾压过这个Boss，实力无需再证。";
      
      if (!gameState.cleared[stg.id]) {
        gameState.cleared[stg.id] = true; 
        gameState.gems += stg.gemReward; 
        gameState.level++;
        gameState.potions++; // 赢了奖励一瓶血
        rText = `🎉 首次击杀！获得 <b>${stg.gemReward} 个徽印</b>，升级为 <b>Lv.${gameState.level}</b>，并缴获 1 杯冰美式！`;
      }
      updateHUD();
      const all = gameState.cleared.every(Boolean);
      
      // 切回原版古堡结算界面
      content.innerHTML = `
        <div class="level-header"><div class="level-title">🏆 成功熬过本月！</div></div>
        <div class="box" style="text-align:center; padding: 40px;">
          <div style="font-size: 80px; filter: drop-shadow(0 0 20px #2ecc71); margin-bottom: 20px;">✨</div>
          <div style="font-size: 1.2rem; margin-bottom: 20px;">${stg.enemy.name} 被你精妙的操作击溃了。</div>
          <div class="reward-box" style="border-color:#f1c40f;">${rText}</div>
          <div class="center-actions" style="margin-top:30px;">
            <button class="btn next" onclick="document.getElementById('closeModal').click()">返回走廊</button>
            ${all ? `<button class="btn next" style="background: linear-gradient(135deg, #e74c3c, #c0392b); color: #fff;" onclick="openFinal()">开启 最终圣殿</button>` : ''}
          </div>
        </div>
      `;
    }

    function loseStage() {
      gameState.inBattle = false; gameState.isAnimating = false;
      content.innerHTML = `
        <div class="level-header"><div class="level-title" style="color:#e74c3c;">💥 申请受挫</div></div>
        <div class="box" style="text-align:center; padding: 40px;">
          <div style="font-size: 80px; filter: grayscale(1); margin-bottom: 20px;">🥀</div>
          <div style="font-size: 1.2rem; margin-bottom: 20px;">你被 DDL 压垮了... 但不要灰心，收拾心情重来一次！</div>
          <div class="info-list" style="text-align:left;">
            <div class="info-item">💡 提示：善用【外教精修斩】打出高爆发，残血时一定要喝【冰美式】。</div>
          </div>
          <div class="center-actions" style="margin-top:30px;">
            <button class="btn next" onclick="openStage(${gameState.currentStage.id})">复活再战</button>
            <button class="btn next" style="background: linear-gradient(135deg, #7f8c8d, #34495e); color:#fff;" onclick="document.getElementById('closeModal').click()">暂时撤退</button>
          </div>
        </div>
      `;
    }

    function openFinal() {
      content.innerHTML = `
        <div class="final-reward-screen">
          <div class="level-title" style="background: linear-gradient(90deg, #fff, #f1c40f, #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">🏰 终极 Offer 圣殿已开启 🏰</div>
          <div class="big-gem">🎓</div>
          <div class="level-desc" style="max-width:800px; margin: 0 auto; font-size: 1.1rem;">
            恭喜你熬过了漫长且煎熬的申请季。<br>恶龙已死，僵尸退散，死神退避。<br>现在，准备好迎接属于你的 Offer 雨吧！
          </div>
          <div class="box" style="margin-top:30px; max-width:500px; margin-left:auto; margin-right:auto; text-align:left;">
            <div class="character-name">秋招战绩核算</div>
            <div class="info-list">
              <div class="info-item">✨ 收集徽印：${gameState.gems} / 3</div>
              <div class="info-item">✨ 最终申请力：Lv.${gameState.level}</div>
              <div class="info-item">✨ 荣誉称号：<b>时间管理大师 · 斩妖者</b></div>
            </div>
          </div>
          <div class="center-actions" style="margin-top:30px;">
            <button class="btn next" onclick="alert('即将返回总地图！')">荣耀归来</button>
          </div>
        </div>
      `;
      modal.classList.add("show");
    }

    // 绑定大门点击事件
    document.querySelectorAll(".door[data-level]").forEach(door => { door.addEventListener("click", () => openStage(Number(door.dataset.level))); });
    document.getElementById("finalDoor").addEventListener("click", () => { if(gameState.cleared.every(Boolean)) openFinal(); else alert("还有 Boss 未清理，圣殿无法开启！"); });
    updateHUD();

  </script>
</body>
</html>
