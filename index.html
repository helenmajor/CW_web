<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradQuest | 留魔冲刺路线图</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; }

        body {
            /* 柔和复古羊皮纸底色 */
            background: linear-gradient(145deg, #eaddc5 0%, #d1bc97 100%);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px;
        }

        /* ================= 顶部导航栏 ================= */
        .top-nav {
            width: 100%; max-width: 1100px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px);
            padding: 15px 30px; border-radius: 40px; box-shadow: 0 10px 20px rgba(0,30,45,0.1);
            margin-bottom: 20px; border: 2px solid #fff;
        }
        .nav-logo { font-size: 1.5rem; font-weight: 900; color: #4a2559; letter-spacing: 1px;}
        .nav-logo i { color: #f9b81b; margin-right: 5px; }
        
        .tab-group { display: flex; gap: 15px; }
        .tab-btn {
            padding: 10px 25px; border-radius: 30px; font-size: 1.05rem; font-weight: bold;
            cursor: pointer; border: 2px solid transparent; background: #f0f4f8; color: #64748b; transition: 0.3s;
        }
        .tab-btn:hover { background: #e2e8f0; }
        .tab-btn.active.t-y2 { background: #4a2559; color: #fff; box-shadow: 0 5px 15px rgba(74, 37, 89, 0.4); border-color: #2a1136;}
        .tab-btn.active.t-y3 { background: #8a2a16; color: #fff; box-shadow: 0 5px 15px rgba(138, 42, 22, 0.4); border-color: #5c1b0e;}

        /* ================= 游戏主板 ================= */
        .map-container { display: none; width: 100%; max-width: 1100px; animation: fadeIn 0.4s; }
        .map-container.active { display: flex; flex-direction: column; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .game-board {
            width: 100%; height: 750px; background: #fdf8ed; border-radius: 48px;
            box-shadow: 0 25px 35px -12px rgba(0, 30, 45, 0.4); border: 3px solid #e6ceaa;
            position: relative; overflow: hidden; display: flex; flex-direction: column;
        }
        
        .board-y3 { background: #fff5f0; border-color: #ffd6c2; }
        
        .board-header {
            background: rgba(255, 250, 235, 0.85); backdrop-filter: blur(8px);
            padding: 14px 28px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 3px solid #e6ceaa; z-index: 20;
        }
        .board-y3 .board-header { background: rgba(255, 245, 240, 0.85); border-bottom-color: #ffbba6;}

        .board-header h1 { color: #4a2559; font-size: 1.5rem; font-weight: 900; }
        .board-y3 .board-header h1 { color: #8a2a16; }
        
        .coin-panel {
            background: #4a2559; color: #ffdf99; padding: 8px 22px; border-radius: 60px;
            font-weight: bold; font-size: 1.2rem; border: 2px solid #ffcd7e; box-shadow: 0 3px 0 #2a1136;
        }
        .coin-panel i { margin-right: 8px; color: #f9b81b; }

        .map-area { flex: 1; position: relative; background: #f4ebd8; overflow: hidden; }
        .board-y3 .map-area { background: #fcece3; }

        /* ================= 魔法道路 (SVG) ================= */
        .path-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        
        /* 紫色+鎏金 道路风格 */
        .road { fill: none; stroke: #b891c9; stroke-width: 48; stroke-linecap: round; stroke-linejoin: round; filter: blur(3px); }
        .road-core { fill: none; stroke: #6b3a82; stroke-width: 24; stroke-linecap: round; stroke-linejoin: round; }
        
        /* Year 3 道路颜色 (赤橙色) */
        .board-y3 .road { stroke: #ffb085; }
        .board-y3 .road-core { stroke: #ff7a3d; }

        /* 调整位置与翻转 */
        .svg-y2 { transform: scale(1.65, 1.45) translate(35px, 28px); transform-origin: center; }
        /* Year 3 做了水平翻转，让路线看起来不一样 */
        .svg-y3 { transform: scale(-1.65, 1.45) translate(15px, 28px); transform-origin: center; }

        /* ================= 节点卡片样式 ================= */
        .node {
            position: absolute; z-index: 15; width: 64px; height: 64px;
            background: #2a1136; border: 3px solid #f7d38b; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; color: white;
            font-size: 1.7rem; cursor: pointer; box-shadow: 0 6px 0 #18091f;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        .board-y3 .node { background: #4a1911; border-color: #ffbba6; box-shadow: 0 6px 0 #2a0b06;}

        .node:hover { transform: translateY(-5px) scale(1.05); box-shadow: 0 10px 0 #18091f; }
        .board-y3 .node:hover { box-shadow: 0 10px 0 #2a0b06; }

        .node-label {
            position: absolute; top: 70px; width: 140px; left: -38px; text-align: center;
            font-size: 0.8rem; font-weight: 900; color: #4a2559; background: rgba(255, 250, 225, 0.95);
            border-radius: 40px; padding: 5px 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            pointer-events: none; white-space: nowrap; border: 1px solid #f3cf9a;
        }
        .board-y3 .node-label { color: #8a2a16; background: rgba(255, 240, 235, 0.95); border-color: #ffbba6;}

        /* Year 2 节点完美定位 */
        .n1 { top: 12%; left: 12%; }
        .n2 { top: 12%; left: 34%; }
        .n3 { top: 32%; left: 23%; }
        .n4 { top: 28%; left: 54%; }
        .n5 { top: 48%; left: 74%; }
        .n6 { top: 74%; left: 53%; }
        .n7 { top: 70%; left: 28%; background: #5a2673; border-color: #f9d976; }
        .n7 .fa-star { color: #f9d976; filter: drop-shadow(0 0 4px gold); animation: pulseStar 1.4s infinite; }

        /* Year 3 节点完美定位 (根据翻转后的路线严格对齐) */
        .y3-n1 { top: 12%; left: 85%; }
        .y3-n2 { top: 12%; left: 63%; }
        .y3-n3 { top: 32%; left: 74%; }
        .y3-n4 { top: 28%; left: 43%; }
        .y3-n5 { top: 48%; left: 23%; }
        .y3-n6 { top: 74%; left: 44%; }
        .y3-n7 { top: 70%; left: 69%; }
        .y3-n8 { top: 75%; left: 88%; background: #eab308; border-color: #fff; } /* 毕业大殿 */
        .y3-n8 .fa-crown { color: #fff; filter: drop-shadow(0 0 5px rgba(255,255,255,0.8)); animation: pulseStar 1.4s infinite; }

        @keyframes pulseStar { 0%, 100% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.25); text-shadow: 0 0 5px gold; } }

        /* ================= 游戏弹窗框架 ================= */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 20, 30, 0.85); backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center; z-index: 200;
        }
        .modal-overlay.active { display: flex; animation: modalFadeIn 0.3s; }
        @keyframes modalFadeIn { from { opacity: 0; } to { opacity: 1; } }

        .modal-content {
            background: #fffcf3; width: 95%; max-width: 1200px; height: 90vh;
            border-radius: 36px; padding: 25px; border: 3px solid #e2bc7c;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.6); display: flex; flex-direction: column;
            position: relative; /* 确保返回按钮能绝对定位 */
        }

        .modal-header {
            font-size: 1.5rem; color: #4a2559; border-bottom: 2px dashed #e7bc7a;
            padding-bottom: 15px; margin-bottom: 15px; display: flex; justify-content: space-between;
            align-items: center; font-weight: 900;
        }
        
        .btn-close {
            background: #bd5e4a; color: white; border: none; padding: 8px 20px;
            border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 1rem; box-shadow: 0 4px 0 #8a3e2c; transition: 0.2s;
        }
        .btn-close:hover { background: #d4735e; transform: translateY(2px); box-shadow: 0 2px 0 #8a3e2c; }

        .game-frame { flex: 1; width: 100%; border: 2px solid #e2bc7c; border-radius: 20px; background: #000; }
        
        /* 报错提示框 */
        #errorNotice { display: none; color: #ef4444; font-weight: bold; text-align: center; margin-top: 10px; }
    </style>
</head>

            <div class="node y3-n4" onclick="openGame('year3_4.html', 'Y3-4 记忆星图')"><i class="fas fa-sparkles"></i><div class="node-label">4. PS 故事</div></div>
            <div class="node y3-n5" onclick="openGame('year3_5.html', 'Y3-5 傲娇导师')"><i class="fas fa-cat"></i><div class="node-label">5. 导师推荐</div></div>
            <div class="node y3-n6" onclick="openGame('year3_6.html', 'Y3-6 备考塔防')"><i class="fas fa-calendar-alt"></i><div class="node-label">6. 备考排期</div></div>
            <div class="node y3-n7" onclick="openGame('year3_7.html', 'Y3-7 沼泽排雷')"><i class="fas fa-biohazard"></i><div class="node-label">7. DIY 排坑</div></div>
            <div class="node y3-n8" onclick="openGame('year3_8.html', 'Y3-8 星辰加冕')"><i class="fas fa-crown"></i><div class="node-label">8. 毕业加冕</div></div>

</div>

<div class="modal-overlay" id="gameModal">
    <div class="modal-content">
        <div class="modal-header">
            <span id="modalTitle">关卡加载中...</span>
            <button class="btn-close" onclick="closeGame()"><i class="fas fa-sign-out-alt"></i> 退出关卡</button>
        </div>
        <iframe class="game-frame" id="gameFrame" src="" frameborder="0" onerror="iframeError()"></iframe>
        <div id="errorNotice">⚠️ 浏览器找不到该文件！请检查你 VSCode 里的文件名是不是叫 <span id="errFileName"></span></div>
    </div>
</div>

<script>
    function switchTab(year) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.tab-btn.t-${year}`).classList.add('active');
        
        document.querySelectorAll('.map-container').forEach(map => map.classList.remove('active'));
        document.getElementById(`map-${year}`).classList.add('active');
    }

    function openGame(filename, title) {
        document.getElementById('modalTitle').innerText = title;
        const iframe = document.getElementById('gameFrame');
        const errorNotice = document.getElementById('errorNotice');
        
        errorNotice.style.display = 'none'; // 重置报错
        iframe.style.display = 'block';
        iframe.src = filename;
        
        // 捕捉加载失败 (如果黑屏就是文件名写错了)
        iframe.onload = function() {
            try {
                // 如果是 404，某些浏览器会抛错
                if(iframe.contentDocument.title === "404 Not Found" || iframe.contentDocument.body.innerHTML === "") {
                    throw new Error("Empty");
                }
            } catch(e) {
                // 跨域或加载失败显示提示
                document.getElementById('errFileName').innerText = filename;
                // errorNotice.style.display = 'block'; (如果本地 file:// 协议跨域可以不亮这行)
            }
        };

        document.getElementById('gameModal').classList.add('active');
    }

    function closeGame() {
        document.getElementById('gameModal').classList.remove('active');
        setTimeout(() => { document.getElementById('gameFrame').src = ''; }, 300);
    }
</script>
</body>
