<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Y3-8 星辰加冕大殿</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { background: radial-gradient(circle at center, #2c1e4a 0%, #0d0914 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: #fff; font-family: 'Segoe UI', sans-serif;}
        .room { text-align: center; max-width: 800px; padding: 40px;}
        h2 { color: #fde047; font-size: 2.5rem; margin-bottom: 30px; text-shadow: 0 0 20px rgba(253, 224, 71, 0.6);}
        
        .certificate {
            background: url('https://www.transparenttextures.com/patterns/cream-paper.png'), linear-gradient(135deg, #fffcf2, #f5ecd5);
            padding: 50px; border-radius: 5px; box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            color: #2c1e16; border: 8px double #c8a165; position: relative; margin-bottom: 30px;
        }
        .cert-header { font-family: "Georgia", serif; font-size: 2.2rem; color: #8b5a2b; border-bottom: 2px solid #8b5a2b; padding-bottom: 10px; margin-bottom: 20px;}
        .cert-body { font-size: 1.2rem; line-height: 1.8; font-family: "Times New Roman", serif;}
        .cert-name { font-size: 2rem; font-weight: bold; color: #b22222; border-bottom: 2px dotted #b22222; margin: 0 10px; font-family: "Georgia", serif;}
        
        /* 纯 CSS 绘制的西幻红蜡封泥印章 (完美替换争议表情) */
        .wax-seal {
            position: absolute; bottom: 25px; right: 35px; width: 80px; height: 80px;
            background: #b22222; border-radius: 50%; border: 3px double #800000;
            color: #fff; font-size: 0.75rem; font-weight: bold; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            transform: rotate(-15deg); box-shadow: 2px 4px 10px rgba(0,0,0,0.4);
            font-family: "Times New Roman", serif; letter-spacing: 1px;
        }
        .wax-seal::after { content: 'OFFICIAL'; font-size: 0.6rem; opacity: 0.8; }
        .wax-seal i { font-size: 1.5rem; margin-bottom: 2px;}

        .rewards { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .reward-item { background: rgba(255,255,255,0.1); border: 1px solid #fde047; padding: 15px; border-radius: 12px; color: #fde047; display: flex; align-items: center; gap: 10px; font-weight: bold;}
    </style>
</head>
<body>
<div class="room">
    <h2><i class="fas fa-crown"></i> 星辰加冕仪式</h2>
    
    <div class="certificate">
        <div class="cert-header">GradQuest 结业证书</div>
        <div class="cert-body">
            兹证明杰出探索者<br>
            <span class="cert-name" id="playerName">加载中...</span><br><br>
            已成功穿越 Y2 的迷茫与 Y3 的黑暗沼泽，熟练掌握申请魔法全套流程。<br>
            现授予你【魔导师申请者】头衔，愿你的梦校 Offer 如约而至！
        </div>
        <div class="wax-seal">
            <i class="fas fa-university"></i>
            GRADQUEST
        </div>
    </div>

    <div class="rewards">
        <div class="reward-item"><i class="fas fa-ticket-alt"></i> 名校 1v1 诊断券</div>
        <div class="reward-item"><i class="fas fa-comments"></i> 学长学姐深度答疑权限</div>
        <div class="reward-item"><i class="fas fa-envelope-open-text"></i> 导师亲笔推荐信</div>
        <div class="reward-item"><i class="fas fa-gift"></i> 文书精修 Workshop 门票</div>
    </div>
</div>

<script>
    // 动态获取用户登录名 (如果没有登录数据，默认显示"冒险者")
    window.onload = function() {
        // 假设你们后期的登录系统会把名字存在 localStorage 里的 'userName' 键名下
        const storedName = localStorage.getItem('userName') || '冒险者 (Adventurer)';
        document.getElementById('playerName').innerText = storedName;
        
        // 自动触发撒花特效
        fireConfetti();
    };

    function fireConfetti() {
        var duration = 5000;
        var end = Date.now() + duration;
        (function frame() {
            confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#fde047', '#f59e0b', '#38bdf8'] });
            confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#fde047', '#f59e0b', '#38bdf8'] });
            if (Date.now() < end) requestAnimationFrame(frame);
        }());
    }
</script>
</body>
</html>
