<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Y2-6 绝密档案馆</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 保持原有的暗黑解密风格 */
        body { background: radial-gradient(circle at center, #1e2022 0%, #000 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: #e8e6e3; font-family: 'Segoe UI', sans-serif;}
        .room { width: 100%; max-width: 900px; background: rgba(20, 22, 24, 0.85); border: 2px solid #c8a165; border-radius: 20px; padding: 40px; text-align: center; }
        .header h2 { color: #f9d976; margin-bottom: 30px; font-size: 2rem;}
        .archives { display: flex; gap: 20px; justify-content: center; }
        .case-file { background: linear-gradient(135deg, #2a2d34, #1b1c20); border: 1px solid #4a4d55; border-radius: 12px; width: 320px; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); position: relative; }
        .case-file.revealed { border-color: #2ecc71; background: linear-gradient(135deg, #1b2a22, #101a15); }
        .profile-data { text-align: left; border-top: 1px dashed #4a4d55; padding-top: 15px; margin: 15px 0; font-size: 0.9rem;}
        .btn-guess { background: #c8a165; border: none; padding: 8px; width: 100%; margin-bottom: 8px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .btn-guess:hover { background: #f9d976; }
        .truth { display: none; color: #a8e6cf; text-align: left; font-size: 0.9rem; border-top: 1px solid #2ecc71; padding-top: 10px;}
        .btn-complete { margin-top: 30px; padding: 12px 30px; background: #2ecc71; color: #000; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; display: none; }
    </style>
</head>
<body>
<div class="room">
    <div class="header"><h2><i class="fas fa-folder-open"></i> 绝密档案馆：命运重演</h2><p>翻开前人的档案，猜测他们的结局，寻找破局的关键。</p></div>
    <div class="archives">
        <div class="case-file" id="case1">
            <div style="font-size:3rem; margin-bottom:10px;">🧑‍💻</div>
            <div class="profile-data">
                <div>专业：信计 (ICS)</div>
                <div>GPA：<span style="color:#e74c3c;">80/100 (危险)</span></div>
                <div>核心：<span style="color:#f9d976;">SAP研发实习 + Github高星</span></div>
            </div>
            <div id="guess1">
                <button class="btn-guess" onclick="reveal(1)">A. 全聚德</button>
                <button class="btn-guess" onclick="reveal(1)">B. 逆袭 Top 50</button>
            </div>
            <div class="truth" id="truth1"><b>真相：逆袭 Top 50！</b><br>顶级名企研发实习和实战代码能力，弥补了 GPA 的不足。</div>
        </div>
        <div class="case-file" id="case2">
            <div style="font-size:3rem; margin-bottom:10px;">👩‍🎓</div>
            <div class="profile-data">
                <div>专业：数据科学 (DS)</div>
                <div>GPA：<span style="color:#f9d976;">91/100 (极高)</span></div>
                <div>核心：<span style="color:#e74c3c;">零实习、零科研</span></div>
            </div>
            <div id="guess2">
                <button class="btn-guess" onclick="reveal(2)">A. 乱杀 Top 30</button>
                <button class="btn-guess" onclick="reveal(2)">B. 申请严重受挫</button>
            </div>
            <div class="truth" id="truth2"><b>真相：申请受挫！</b><br>“空心学霸”陷阱。理工科/商科没有实战经历，高分也难救主。</div>
        </div>
    </div>
    <button class="btn-complete" id="btnEnd" onclick="finishNode()">吸收经验，返回地图 (+30金币)</button>
</div>
<script>
    let count = 0;
    function reveal(id) {
        document.getElementById(`case${id}`).classList.add('revealed');
        document.getElementById(`guess${id}`).style.display = 'none';
        document.getElementById(`truth${id}`).style.display = 'block';
        count++;
        if(count === 2) document.getElementById('btnEnd').style.display = 'inline-block';
    }
    function finishNode() { alert("已返回地图！请前往 Y2-7 节点进行最终测试。"); }
</script>
</body>
</html>
